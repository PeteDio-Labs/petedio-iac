# Workflow B (IaC) for the Palworld dedicated-server LXC (234) — thin caller of the reusable
# ansible-stack.yml (PET-250; the job logic used to be duplicated per stack). This file owns
# only the triggers + the per-host serialization; see ansible-stack.yml for the jobs.
# NB: the apply installs ~12-15 GB of server binaries via SteamCMD on 234 (the first run is
# long); community.general is needed for the role's ufw tasks. (PET-157)
name: ansible-palworld

on:
  pull_request:
    paths:
      - ansible/playbooks/configure-palworld.yml
      - ansible/roles/palworld/**
      - ansible/inventory/hosts.yml
      - .github/workflows/ansible-palworld.yml
      - .github/workflows/ansible-stack.yml
  # NB: ansible-stack.yml is deliberately in pull_request.paths ONLY — shared-logic edits
  # get each stack's syntax-check on the PR, but must NOT re-apply every stack's playbook to
  # its live host on merge (a CI refactor is not a fleet-wide deploy).
  push:
    branches: [main]
    paths:
      - ansible/playbooks/configure-palworld.yml
      - ansible/roles/palworld/**
      - ansible/inventory/hosts.yml
      - .github/workflows/ansible-palworld.yml

# Serialize runs of this workflow so two fast merges can't race two ansible applies
# against host 234. Separate group from terraform.yml's tf-homelab and ansible-openfaas —
# a different host, and this workflow never touches Terraform state.
concurrency:
  group: ansible-palworld
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token

jobs:
  stack:
    uses: ./.github/workflows/ansible-stack.yml
    with:
      playbook: playbooks/configure-palworld.yml
      stack: palworld
      collections: community.general
      # host-key-checking stays the default "False" (mirrors the pre-dedup behavior)
