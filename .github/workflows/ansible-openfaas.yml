# Workflow B (IaC) for the OpenFaaS host-config (LXC 241) — thin caller of the reusable
# ansible-stack.yml (PET-250; the job logic used to be duplicated per stack). This file owns
# only the triggers + the per-host serialization; see ansible-stack.yml for the jobs. (PET-88)
name: ansible-openfaas

on:
  pull_request:
    paths:
      - ansible/playbooks/configure-openfaas.yml
      - ansible/inventory/hosts.yml
      - .github/workflows/ansible-openfaas.yml
      - .github/workflows/ansible-stack.yml
  # NB: ansible-stack.yml is deliberately in pull_request.paths ONLY — shared-logic edits
  # get each stack's syntax-check on the PR, but must NOT re-apply every stack's playbook to
  # its live host on merge (a CI refactor is not a fleet-wide deploy).
  push:
    branches: [main]
    paths:
      - ansible/playbooks/configure-openfaas.yml
      - ansible/inventory/hosts.yml
      - .github/workflows/ansible-openfaas.yml

# Serialize runs of this workflow: two fast merges would race two ansible applies
# against the same host (241). Separate group from terraform.yml's tf-homelab —
# this workflow never touches Terraform state.
concurrency:
  group: ansible-openfaas
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token

jobs:
  stack:
    uses: ./.github/workflows/ansible-stack.yml
    with:
      playbook: playbooks/configure-openfaas.yml
      stack: openfaas
      with-nexus-creds: true
      host-key-checking: "True"
      ansible-ssh-args: "-o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new"
