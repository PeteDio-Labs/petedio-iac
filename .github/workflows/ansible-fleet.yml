# Workflow B (IaC) for the fleet activity view on LXC 242 — thin caller of the reusable
# ansible-stack.yml (PET-250 pattern). Merge = deploy: a change to the static page under
# tools/mission-control/co-latro-fleet/ (or the play/nginx/mirror files) redeploys the
# nginx origin behind fleet.pdlab.dev from the self-hosted runner — no manual
# configure-fleet run (PET-255).
#
# CI runs the play WITHOUT the minio_evals_ak/sk extra-vars: the openfaas-ci Vault role
# grants only the lxc-ssh key, and the play (PET-255) skips `mc alias set` when creds are
# absent, asserting the alias already exists on 242. First-time provisioning of a fresh 242
# stays the operator-run-with-creds path documented in the play header.
#
# fleet_version=<github.sha> rides in via the stack's non-secret extra-vars input so the
# PET-222 cache-bust (`app.js?v=<sha>`) tracks the deployed commit — the in-container git
# lookup can't see .git and would otherwise pin `?v=nover` forever.
name: ansible-fleet

on:
  pull_request:
    paths:
      - tools/mission-control/co-latro-fleet/**
      - ansible/playbooks/configure-fleet.yml
      - ansible/playbooks/files/fleet-nginx.conf
      - ansible/playbooks/templates/fleet-evals-mirror.service.j2
      - ansible/playbooks/templates/fleet-evals-mirror.timer.j2
      - ansible/inventory/hosts.yml
      - .github/workflows/ansible-fleet.yml
      - .github/workflows/ansible-stack.yml
  # NB: ansible-stack.yml is deliberately in pull_request.paths ONLY — shared-logic edits
  # get this stack's syntax-check on the PR, but must NOT re-apply on merge (PET-250 rule).
  push:
    branches: [main]
    paths:
      - tools/mission-control/co-latro-fleet/**
      - ansible/playbooks/configure-fleet.yml
      - ansible/playbooks/files/fleet-nginx.conf
      - ansible/playbooks/templates/fleet-evals-mirror.service.j2
      - ansible/playbooks/templates/fleet-evals-mirror.timer.j2
      - .github/workflows/ansible-fleet.yml

# Serialize: two fast merges must not race two ansible applies against 242. Separate group
# from terraform.yml and the other ansible stacks.
concurrency:
  group: ansible-fleet
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token

jobs:
  stack:
    uses: ./.github/workflows/ansible-stack.yml
    with:
      playbook: playbooks/configure-fleet.yml
      stack: fleet
      host-key-checking: "True"
      ansible-ssh-args: "-o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new"
      extra-vars: '{"fleet_version": "${{ github.sha }}"}'
