# Workflow B — GitOps / IaC (CONVENTIONS §4): plan-on-PR, apply-on-merge.
# Runs on the self-hosted runner (VM 232) INSIDE the homelab, so it can reach
# the Proxmox API (.10:8006) and the MinIO state backend (.221:9000) — a
# GitHub-hosted runner cannot route to 192.168.50.0/24.
name: terraform

on:
  pull_request: {}
  push:
    branches: [main]

env:
  TF_IN_AUTOMATION: "1"
  # Creds for the MinIO S3 backend + bpg/proxmox provider come from repo secrets.
  AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
  TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
  TF_VAR_ssh_public_key: ${{ secrets.LXC_SSH_PUBLIC_KEY }}

permissions:
  contents: read
  pull-requests: write # to post the plan as a PR comment

jobs:
  tf:
    runs-on: [self-hosted, linux, x64, homelab]
    defaults:
      run:
        working-directory: environments/homelab
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        run: terraform validate

      - name: Plan
        if: github.event_name == 'pull_request'
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan | tee plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/homelab/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)...' : plan;
            const body = ['#### `terraform plan` — homelab', '```hcl', truncated, '```'].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve
