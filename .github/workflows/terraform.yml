# Workflow B — GitOps / IaC (CONVENTIONS §4): validate-on-PR, apply-on-merge.
#
# SECURITY SPLIT (PET-104): this repo is PUBLIC and the apply runner is self-hosted INSIDE
# the homelab. A `pull_request` runs the PR's OWN workflow + Terraform config, so running it
# on the self-hosted runner = arbitrary code execution on a box that can reach Proxmox
# (.10:8006), MinIO state (.221:9000), Vault (.223:8200), and the whole 192.168.50.0/24 —
# and the old flow even minted Vault creds on `pull_request` first. So the jobs are split by
# trust:
#   * validate  — PR + push. GitHub-HOSTED, ephemeral, NO Vault, NO LAN, NO state. fmt +
#                 `init -backend=false` + validate. Worst case a malicious PR provider runs
#                 in a throwaway hosted sandbox with no creds and no homelab reachability.
#   * apply     — push to main ONLY (i.e. already-merged, trusted code). Self-hosted; the
#                 ONLY job that mints Vault creds and touches state. PR-controlled code never
#                 runs here.
# Tradeoff: PRs no longer get a `terraform plan` comment (a real plan needs the LAN backend +
# provider creds, which we deliberately withhold from PR runs). Authoritative plan is the
# operator's (local) or is visible in the apply-on-merge log. The matching Vault-role change
# (drop the pull_request sub from the github-actions role) is in vault-config/auth.tf.

name: terraform

on:
  pull_request: {}
  push:
    branches: [main]

# Serialize ALL runs in one group: the MinIO state backend has no locking (backend.tf), so
# concurrent applies racing the same state file is the repo's #1 footgun. cancel-in-progress:
# false queues instead of killing a mid-flight apply. (PET-105/PET-143.)
concurrency:
  group: tf-homelab
  cancel-in-progress: false

# Least privilege at the top: read-only by default. The apply job re-grants id-token below;
# nothing here needs pull-requests:write anymore (the PR plan-comment step is gone — PET-104).
permissions:
  contents: read

jobs:
  # --- PR-safe validation -------------------------------------------------------------
  # GitHub-hosted + ephemeral: no homelab reachability, no Vault token, no state access. This
  # is the ONLY job a pull_request runs. `init -backend=false` skips the MinIO backend (which
  # a hosted runner can't reach anyway) and just installs providers so `validate` can run.
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/homelab
    env:
      TF_IN_AUTOMATION: "1"
      # `terraform validate` instantiates the vault provider, whose `address` is a required
      # argument — set a dummy so validate doesn't error on a missing VAULT_ADDR. It NEVER
      # connects on validate (no plan/apply here). See docs/GOTCHAS.md.
      VAULT_ADDR: https://vault.invalid:8200
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend — a hosted runner has no MinIO creds/LAN)
        run: terraform init -input=false -backend=false

      - name: Validate
        run: terraform validate

      # vault-config is a SEPARATE root (own state, operator-applied via scripts/apply-vault-config.sh
      # — deliberately NEVER in the apply job below; the Vault root token must not touch CI). The
      # `fmt -check -recursive` above already covers its formatting, but `terraform validate` is NOT
      # recursive — it only checks the environments/homelab root. So validate the vault-config root
      # explicitly here, or a malformed vault-config .tf merges with a green `validate` and only
      # fails later at the operator's manual plan (PET-266: PR #153 was vault-config-only and its
      # `validate` never touched the changed dir). Same hosted/no-creds posture; -backend=false
      # skips MinIO, VAULT_ADDR (dummy, above) lets the vault provider instantiate without connecting.
      - name: Init vault-config (no backend)
        working-directory: environments/homelab/vault-config
        run: terraform init -input=false -backend=false

      - name: Validate vault-config
        working-directory: environments/homelab/vault-config
        run: terraform validate

  # --- Privileged apply ---------------------------------------------------------------
  # Self-hosted, INSIDE the homelab. Runs ONLY on push to main (post-merge, trusted code) and
  # is gated behind the hosted `validate` job. The only job that mints Vault creds + touches
  # state. `needs: validate` means a fmt/validate failure on the merge commit blocks the apply.
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: [self-hosted, linux, x64, homelab]
    permissions:
      contents: read
      id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token
    defaults:
      run:
        working-directory: environments/homelab
    env:
      TF_IN_AUTOMATION: "1"
      # Terraform's `vault` provider (providers.tf) reads these at apply time when
      # postgres_ready=true (the gated vault_kv_secret_v2.poker_db read). vault-action does
      # NOT export VAULT_ADDR/VAULT_CACERT; address + CA path are pinned here. VAULT_CACERT is
      # a file path → the committed self-signed CA (absolute, working-dir-independent).
      VAULT_ADDR: https://192.168.50.223:8200
      VAULT_CACERT: ${{ github.workspace }}/environments/homelab/vault-ca.crt
      # pool.tf gate (PET-160): one repo variable drives both terraform (var.manage_resource_pool)
      # and the preflight step below, so they can't drift. Default false → pool is a no-op and the
      # preflight is skipped. Flip MANAGE_RESOURCE_POOL=true AFTER granting Pool.Allocate (PET-159).
      TF_VAR_manage_resource_pool: ${{ vars.MANAGE_RESOURCE_POOL || 'false' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      # vault-action's `caCertificate` input wants BASE64-encoded PEM content, and a `with:`
      # value can't read a file — so emit the committed self-signed CA (relative to
      # working-directory) as a base64 step output. We verify TLS against this CA.
      - name: Encode Vault CA
        id: vault_ca
        shell: bash
        run: echo "b64=$(base64 -w0 vault-ca.crt)" >> "$GITHUB_OUTPUT"

      # Exchange the GitHub Actions OIDC token for a short-lived Vault token (JWT auth, role
      # github-actions) and export the backend/provider creds. The github-actions Vault role
      # now binds ONLY the main-push sub (PET-104), so this can't be minted from a PR/fork.
      - name: Vault — mint creds via OIDC
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: https://192.168.50.223:8200
          method: jwt
          # The JWT backend is mounted at jwt-github/ (not the default jwt/), so the auth path
          # must be set explicitly — otherwise vault-action POSTs to auth/jwt/login → 403.
          path: jwt-github
          role: github-actions
          jwtGithubAudience: https://github.com/PeteDio-Labs
          caCertificate: ${{ steps.vault_ca.outputs.b64 }}
          exportToken: true
          exportEnv: true
          secrets: |
            kv/data/iac/minio access_key | AWS_ACCESS_KEY_ID ;
            kv/data/iac/minio secret_key | AWS_SECRET_ACCESS_KEY ;
            kv/data/iac/proxmox api_token | TF_VAR_proxmox_api_token ;
            kv/data/iac/lxc-ssh public_key | TF_VAR_ssh_public_key ;
            kv/data/iac/cloudflare api_token | TF_VAR_cloudflare_api_token ;
            kv/data/iac/cloudflare account_id | TF_VAR_cloudflare_account_id ;
            kv/data/iac/cloudflare zone_id | TF_VAR_cloudflare_zone_id ;
            kv/data/iac/cloudflare tunnel_id | TF_VAR_cloudflare_tunnel_id

      # Preflight (PET-160): when the pool is being managed, prove the IaC token actually holds
      # Pool.Allocate/Pool.Audit BEFORE plan/apply — so a missing privilege fails LOUD here (on
      # the PR and on merge) with the fix, instead of a green plan-on-PR that 403s deep in apply
      # (the PET-159 poison pill). Read-only `/access/permissions` introspection; no writes. Only
      # runs when the pool gate is on, so it never blocks unrelated PRs while the pool is off.
      - name: Proxmox preflight permissions (pool)
        if: env.TF_VAR_manage_resource_pool == 'true'
        run: ../../scripts/proxmox-preflight-perms.sh --require Pool.Allocate --require Pool.Audit --path /pool/homelab

      - name: Init
        run: terraform init -input=false

      # Plan to a file then apply exactly that plan, so the merge's plan is visible in the log
      # and apply converges on precisely what was planned.
      - name: Plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Apply
        # Applying a saved plan file auto-approves — no -auto-approve needed.
        run: terraform apply -input=false tfplan
