# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
---
# ollama-host — Ubuntu Server 24.04, MSI X570-A PRO, native Ollama (not Docker).
# GPUs: GTX 1660 SUPER (6GB) + RTX 3060 Ti (8GB).
# RESUME BUILDER INFERENCE LAYOUT (Resume Builder P1, retuned from the retired fleet's
# PET-132 worker layout — same GPU pinning, new models). Each lane is pinned ENTIRELY to
# one GPU via CUDA_VISIBLE_DEVICES (two single-GPU ollama services): the QUALITY lane on
# the RTX 3060 Ti (:11434) does resume tailoring / cover letters / application Q&A; the
# FAST lane on the GTX 1660 SUPER (:11435) does keyword extraction, span rewrites, and
# embeddings (JD<->resume, question<->story). See the layout block below.
# NIC: eth0, MAC 2c:f0:5d:a2:7f:4f — WoL enabled (magic packet).
wol_interface: eth0
wol_mac: "2c:f0:5d:a2:7f:4f"
ollama_network_interface: eth0
ollama_static_ip: "192.168.50.12"   # renumbered from 192.168.50.59
ollama_prefix: "24"
ollama_gateway: "192.168.50.1"
ollama_dns:
  - "1.1.1.1"
  - "8.8.8.8"

# Connection (no secrets required for the ollama plays).
ansible_user: ansible
ansible_ssh_private_key_file: ~/.ssh/id_ed25519_pedro

# ── Resume builder inference layout (Resume Builder P1) ───────────────────────
# Quality lane served on :11434 pinned to the RTX 3060 Ti (8G); fast lane + embeddings
# on :11435 pinned to the GTX 1660 SUPER (6G). Var names kept from the fleet-era PET-132
# layout ("coder"/"gemma") since they're really just the GPU-pin identifiers — only the
# model VALUES changed.
#
# qwen3.5:9b is the ONE unverified number in this retune (planning doc §10 risk #2): a
# dense 9B's weights + q8_0 KV cache may not hold 100% GPU at 8-16k ctx on an 8G card.
# Verify live with `ollama ps` after applying (100% GPU column, not the offload %% —
# bug #14351 means that figure isn't trustworthy); if it spills, step
# ollama_extra_env's OLLAMA_CONTEXT_LENGTH down further or fall back to the
# already-proven qwen3:8b (kept in ollama_base_models below either way).
ollama_coder_model: "qwen3.5:9b"   # quality lane: resume tailoring, cover letters, Q&A (fallback: qwen3:8b)
ollama_fast_model: "qwen3.5:4b"   # fast lane: keyword extraction, span rewrites
ollama_embed_model: "qwen3-embedding:0.6b"   # fast lane: JD<->resume + question<->story embeddings

# GPU pins — CUDA_VISIBLE_DEVICES values. MUST be the stable per-card UUIDs (indices can
# reorder across reboots). Unchanged from PET-132 — the hardware didn't move, only the
# models pinned to it did. Fill from `nvidia-smi -L` on .12 (the loop can't read them):
#   …RTX 3060 Ti (UUID: GPU-xxxx…)    -> ollama_coder_gpu
#   …GTX 1660 SUPER (UUID: GPU-yyyy…) -> ollama_gemma_gpu
# The ollama-service role asserts these no longer contain REPLACE_WITH before applying.
ollama_coder_gpu: "GPU-0141644f-f1c4-d527-121f-ae96af5372ed"   # RTX 3060 Ti (8GB) — nvidia-smi -L, 2026-06-23
ollama_gemma_gpu: "GPU-bdefa4ac-8c14-9baa-db1b-c94bb471b027"   # GTX 1660 SUPER (6GB) — nvidia-smi -L, 2026-06-23

# Pull every model this host serves (shared store -> one pull per instance). qwen3:8b
# stays pulled as the quality-lane fallback even though it's not resident by default.
ollama_base_models:
  - "{{ ollama_coder_model }}"
  - "{{ ollama_fast_model }}"
  - "{{ ollama_embed_model }}"
  - qwen3:8b

# PRIMARY service (:11434) — pinned to the 3060 Ti, tuned for the quality lane: q8_0
# KV-cache (halves KV VRAM, requires flash attention), keep_alive=-1 so it never unloads.
# Context capped at 16K (not the old coder lane's 32K) per the VRAM-fit risk noted above —
# always still set num_ctx per-request from the app side (planning doc §6 rule: a bare
# default silently truncates a long JD+profile).
ollama_extra_env:
  - "CUDA_VISIBLE_DEVICES={{ ollama_coder_gpu }}"
  - "OLLAMA_FLASH_ATTENTION=1"
  - "OLLAMA_KV_CACHE_TYPE=q8_0"
  - "OLLAMA_CONTEXT_LENGTH=16384"
  - "OLLAMA_KEEP_ALIVE=-1"

# SECOND pinned instance (:11435) — the 1660 SUPER, keeps the fast + embedding models
# resident together (~1.9GB q4 + ~0.6GB embed model, well inside 6G). Turing has no
# tensor cores, so this lane is slow at long-prompt ingest — the app must cap fast-lane
# inputs to ~4k tokens (planning doc §6); flash attention + q8_0 KV still help decode
# speed and VRAM headroom even without tensor-core prompt processing gains.
ollama_extra_instances:
  - name: ollama-1660s
    port: 11435
    description: "Ollama (GTX 1660 SUPER) — fast lane + embeddings, resume builder P1"
    env:
      - "CUDA_VISIBLE_DEVICES={{ ollama_gemma_gpu }}"
      - "OLLAMA_FLASH_ATTENTION=1"
      - "OLLAMA_KV_CACHE_TYPE=q8_0"
      - "OLLAMA_CONTEXT_LENGTH=8192"
      - "OLLAMA_KEEP_ALIVE=-1"

# Keep each model warm on its pinned instance/GPU (loaded with keep_alive=-1). Two
# entries on :11435 — both models resident together, same port.
ollama_resident_models:
  - model: "{{ ollama_coder_model }}"
    port: 11434
  - model: "{{ ollama_fast_model }}"
    port: 11435
  - model: "{{ ollama_embed_model }}"
    port: 11435
