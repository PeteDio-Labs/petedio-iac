# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
# Trimmed to what the ollama plays need; pve01/pve02 kept only as an optional
# recovery jump path (see ansible.cfg) — they are not managed here.
---
all:
  children:
    ollama:
      hosts:
        ollama-host:
          ansible_host: 192.168.50.12  # Ollama native host (renumbered .59 -> .12)

    proxmox:
      hosts:
        pve01:
          ansible_host: 192.168.50.10  # Main Proxmox server (optional recovery jump)
        pve02:
          ansible_host: 192.168.50.11  # Secondary Proxmox server

    # vault (LXC 223) + postgres (LXC 231) — TF-created LXCs that Ansible
    # configures post-create (configure-vault.yml / configure-postgres.yml).
    # Connection vars are scoped per-group (not all.vars) so the ollama/proxmox
    # hosts keep their own settings. root over the SSH key Terraform installs
    # (var.ssh_public_key) — the ansible-automation key (= LXC_SSH_PUBLIC_KEY).
    vault:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        vault-223:
          ansible_host: 192.168.50.223

    postgres:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        postgres-rds-231:
          ansible_host: 192.168.50.231

    # poker-api (LXC 230) — Co-latro Docker host, configured by configure-poker-api.yml
    # (PET-44). TF-created LXC; Ansible installs Docker + nginx + the systemd unit.
    poker-api:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        poker-api-230:
          ansible_host: 192.168.50.230

    # runner — self-hosted GitHub Actions runners (org-scoped to PeteDio-Labs). TF owns the
    # LXCs; Docker is installed by configure-runner-docker.yml (PET-79) so app CI can build
    # images + use service containers. (Runner registration itself is out-of-band.)
    #   runner-232 → pve01 (LXC 232).  runner-233 → pve02 (LXC 233, PET-128) for CI capacity
    #   on both cluster nodes. configure-runner-docker.yml targets this whole group — use
    #   `--limit runner-233` for the first run on the new box.
    runner:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        runner-232:
          ansible_host: 192.168.50.232
        runner-233:
          ansible_host: 192.168.50.233

    # openfaas (LXC 241) — homelab serverless (faasd) host, configured by
    # configure-openfaas.yml (PET-86). TF-created LXC; Ansible installs faasd.
    openfaas:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        openfaas-241:
          ansible_host: 192.168.50.241

    # agent-loop (LXC 242) — autonomous coding loop host (Claude Code), configured by
    # configure-agent-loop.yml (PET-125). TF-created LXC (Ubuntu LTS); Ansible installs
    # Node LTS + Claude Code + gh and the run-loop.sh skeleton. No secrets in inventory:
    # the GitHub token is Vault kv/services/agent-loop, pulled manually (role README).
    agent-loop:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        agent-loop-242:
          ansible_host: 192.168.50.242

    # nexus (LXC 106 / .111) — Docker/Maven registry behind registry.pdlab.dev +
    # docker.pdlab.dev. Brownfield-captured into TF as module.nexus (PET-122). It is a
    # community-scripts Docker LXC; the blob store is an NFS-backed bind mount (mp0
    # /mnt/pete/nexus-data -> /nexus-data) — load-bearing, never disrupt. The host-level
    # config (features/idmap/mount) is out-of-band on the node, not Ansible-managed.
    # NOTE: the in-guest "match the running Nexus service" play is NOT authored yet — it
    # needs in-container truth that the loop can't obtain (SSH-into-guest is forbidden);
    # see PET-122 / docs/runbooks/nexus-import.md. This entry exists so that capture work
    # has a home once an operator supplies that truth.
    nexus:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        nexus-registry:
          ansible_host: 192.168.50.111
