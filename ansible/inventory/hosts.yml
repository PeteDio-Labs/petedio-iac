# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
# Trimmed to what the ollama plays need; pve01/pve02 kept only as an optional
# recovery jump path (see ansible.cfg) — they are not managed here.
---
all:
  children:
    ollama:
      hosts:
        ollama-host:
          ansible_host: 192.168.50.12  # Ollama native host (renumbered .59 -> .12)

    proxmox:
      hosts:
        pve01:
          ansible_host: 192.168.50.10  # Main Proxmox server (optional recovery jump)
        pve02:
          ansible_host: 192.168.50.11  # Secondary Proxmox server

    # vault (LXC 223) — configured by playbooks/configure-vault.yml. Connection
    # vars are scoped to THIS group (not all.vars) so the ollama/proxmox hosts
    # keep their own settings. root over the SSH key Terraform installs
    # (var.ssh_public_key in environments/homelab/vault.tf).
    vault:
      vars:
        ansible_user: root
        # Private half of the repo's LXC_SSH_PUBLIC_KEY / var.ssh_public_key.
        # PLACEHOLDER: the operator adjusts this to wherever their key lives.
        ansible_ssh_private_key_file: ~/.ssh/petedio_lxc_ed25519
      hosts:
        vault-223:
          ansible_host: 192.168.50.223
