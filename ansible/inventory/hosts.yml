# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
# Trimmed to what the ollama plays need; pve01/pve02 kept only as an optional
# recovery jump path (see ansible.cfg) — they are not managed here.
---
all:
  children:
    ollama:
      hosts:
        ollama-host:
          ansible_host: 192.168.50.12  # Ollama native host (renumbered .59 -> .12)

    proxmox:
      hosts:
        pve01:
          ansible_host: 192.168.50.10  # Main Proxmox server (optional recovery jump)
        pve02:
          ansible_host: 192.168.50.11  # Secondary Proxmox server

    # vault (LXC 223) + postgres (LXC 231) — TF-created LXCs that Ansible
    # configures post-create (configure-vault.yml / configure-postgres.yml).
    # Connection vars are scoped per-group (not all.vars) so the ollama/proxmox
    # hosts keep their own settings. root over the SSH key Terraform installs
    # (var.ssh_public_key) — the ansible-automation key (= LXC_SSH_PUBLIC_KEY).
    vault:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        vault-223:
          ansible_host: 192.168.50.223

    postgres:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        postgres-rds-231:
          ansible_host: 192.168.50.231
