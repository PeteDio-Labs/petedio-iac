# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
# Trimmed to what the ollama plays need; pve01/pve02 kept only as an optional
# recovery jump path (see ansible.cfg) — they are not managed here.
---
all:
  children:
    ollama:
      hosts:
        ollama-host:
          ansible_host: 192.168.50.12  # Ollama native host (renumbered .59 -> .12)

    proxmox:
      hosts:
        pve01:
          ansible_host: 192.168.50.10  # Main Proxmox server (optional recovery jump)
        pve02:
          ansible_host: 192.168.50.11  # Secondary Proxmox server

    # vault (LXC 223) + postgres (LXC 231) — TF-created LXCs that Ansible
    # configures post-create (configure-vault.yml / configure-postgres.yml).
    # Connection vars are scoped per-group (not all.vars) so the ollama/proxmox
    # hosts keep their own settings. root over the SSH key Terraform installs
    # (var.ssh_public_key) — the ansible-automation key (= LXC_SSH_PUBLIC_KEY).
    vault:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        vault-223:
          ansible_host: 192.168.50.223

    postgres:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        postgres-rds-231:
          ansible_host: 192.168.50.231

    # poker-api (LXC 230) — Co-latro Docker host, configured by configure-poker-api.yml
    # (PET-44). TF-created LXC; Ansible installs Docker + nginx + the systemd unit.
    poker-api:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        poker-api-230:
          ansible_host: 192.168.50.230

    # runner — self-hosted GitHub Actions runners (org-scoped to PeteDio-Labs). TF owns the
    # LXCs; Docker is installed by configure-runner-docker.yml (PET-79) so app CI can build
    # images + use service containers. (Runner registration itself is out-of-band.)
    #   runner-232 → pve01 (LXC 232).  runner-233 → pve02 (LXC 233, PET-128) for CI capacity
    #   on both cluster nodes. configure-runner-docker.yml targets this whole group — use
    #   `--limit runner-233` for the first run on the new box.
    runner:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        runner-232:
          ansible_host: 192.168.50.232
        runner-233:
          ansible_host: 192.168.50.233

    # openfaas (LXC 241) — homelab serverless (faasd) host, configured by
    # configure-openfaas.yml (PET-86). TF-created LXC; Ansible installs faasd.
    openfaas:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        openfaas-241:
          ansible_host: 192.168.50.241

    # resume-242 (LXC 242, ex agent-loop-242) — repurposed from the retired agent fleet
    # into the Sonia resume builder host (Resume Builder milestone). P0 removed the
    # fleet-era ansible role/playbooks; P1 adds app provisioning (MongoDB, the SvelteKit
    # deploy unit). Group renamed from `agent-loop` — no playbook referenced that group
    # name anymore once the fleet playbooks were gone, so this rename is a clean no-op
    # for anything else. (The TF module label is still `agent_loop` — renaming that would
    # force a destroy/recreate, so it stays.)
    resume:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        resume-242:
          ansible_host: 192.168.50.242

    # tailscale (LXC 244) — Tailscale subnet router advertising the whole LAN
    # (192.168.50.0/24) into the tailnet, configured by configure-tailscale.yml (PET-188).
    # TF-created LXC; scripts/lxc-tun-244.sh adds /dev/net/tun out-of-band on the node
    # (root@pam), then Ansible installs tailscale + enables forwarding + `tailscale up`.
    # No secrets in inventory: the auth key is Vault kv/services/tailscale, passed as an
    # -e extra-var at runtime. See roles/tailscale-router/README.md.
    tailscale:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        tailscale-244:
          ansible_host: 192.168.50.244

    # nexus (LXC 106 / .111) — Docker/Maven registry behind registry.pdlab.dev +
    # docker.pdlab.dev. Brownfield-captured into TF as module.nexus (PET-122). It is a
    # community-scripts Docker LXC; the blob store is an NFS-backed bind mount (mp0
    # /mnt/pete/nexus-data -> /nexus-data) — load-bearing, never disrupt. The host-level
    # config (features/idmap/mount) is out-of-band on the node, not Ansible-managed.
    # NOTE: the in-guest "match the running Nexus service" play is NOT authored yet — it
    # needs in-container truth that the loop can't obtain (SSH-into-guest is forbidden);
    # see PET-122 / docs/runbooks/nexus-import.md. This entry exists so that capture work
    # has a home once an operator supplies that truth.
    nexus:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        nexus-registry:
          ansible_host: 192.168.50.111

    # minio (LXC 221) — the Terraform S3 STATE BACKEND. HAND-MANAGED by design: NO TF
    # resource ever (TF can't create the host that stores TF state — see
    # environments/homelab/minio-state-backend.tf). Config-as-code only, via
    # configure-minio.yml (PET-124); rebuild runbook: docs/runbooks/minio-221-rebuild.md.
    # No secrets in inventory — MinIO root creds come from Vault kv/iac/minio-root,
    # passed as a no_log extra-var (see the playbook header).
    minio:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        minio-221:
          ansible_host: 192.168.50.221

    # authentik (LXC 119 / .119) — live SSO/LDAP behind auth.pdlab.dev. Brownfield-captured
    # into TF as module.authentik (PET-123) before the legacy state retires (PET-50). An
    # Ubuntu Docker LXC; features (nesting/keyctl) are out-of-band on the node, not
    # Ansible-managed. MAXIMALLY SENSITIVE: an SSO/LDAP outage breaks every downstream
    # login — config-match only, never disrupt. NOTE: the in-guest "match the running
    # Authentik service" play is NOT authored yet — it needs in-container truth the loop
    # can't obtain (SSH-into-guest is forbidden) and the app secrets live in Vault .223;
    # see PET-123 / docs/runbooks/authentik-import.md. This entry is the home for that
    # capture once an operator supplies that truth.
    authentik:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
      hosts:
        authentik-119:
          ansible_host: 192.168.50.119

    # palworld (LXC 234) — Palworld 1.0 dedicated game server, fully provisioned by
    # configure-palworld.yml (PET-157): SteamCMD + steam user + server binaries (app
    # 2394010) + a systemd unit enabled & started. Applied on merge by the
    # ansible-palworld.yml workflow. TF-created LXC; root over the TF-installed key.
    # VMID/IP pending confirmation vs the inventory scheme.
    palworld:
      vars:
        ansible_user: root
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
        # PET-168: dual-homed onto the .86 mesh — open 8211/udp from that segment too.
        palworld_mesh_enabled: true
      hosts:
        palworld-234:
          ansible_host: 192.168.50.234
