---
# Palworld shared-world overrides (group: palworld). This file is the write target of
# the panel's World Settings GitOps applier (PET-266) — it upserts exactly these two
# keys via the GitHub API, so keep the file to simple `key: value` lines. Values are
# re-templated into PalWorldSettings.ini by the ansible-palworld apply on merge and
# arm at the NEXT server restart (the panel's stop/start), never mid-session.
#
# Held at the vanilla engine defaults: raised limits must be opted into per-change
# THROUGH the panel (confirm + maintenance window), not pre-baked here. A static
# override auto-applied 10/20 to the live world with no operator action → reverted.
palworld_base_camp_max_in_guild: 10 # BaseCampMaxNumInGuild — raised to the native max (10) to try to unlock a guild whose base allowance ratcheted to its count after the cap was lowered below it (destroying a base dropped the in-game max 3→2). Count is now well below 10; a high cap on a fresh load is the community-reported unlock. (PET-266)
palworld_base_camp_worker_max: 15 # BaseCampWorkerMaxNum (engine default 15, ini max 50, >20 = perf lever)
