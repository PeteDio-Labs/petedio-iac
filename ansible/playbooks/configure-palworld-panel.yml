---
# configure-palworld-panel.yml — deploy the Palworld control panel CO-LOCATED on the game
# server LXC 234, as a native Bun systemd service (PET-266).
#
# WHY CO-LOCATED / NATIVE (not a separate Docker LXC): the separate-LXC path needs Docker
# nesting, which must be set over Proxmox-node SSH — an operator/supervised step. Running the
# panel natively on 234 needs none of that: REST is localhost, and "start" is an SSH-to-localhost
# forced command (systemctl start palworld) using the same restricted key the palworld role
# installs. The panel serves the SPA + /api on :8080; the Cloudflare tunnel points
# palworld.pdlab.dev at it (Authentik-gated, cloudflare-routes.tf).
#
# The app itself is petedio-palworld-panel (Bun; no runtime deps, no build — bun runs the TS
# directly). Its source is copied from the controller checkout (palworld_panel_src).
#
# SECRETS (resolved by scripts/deploy-palworld-panel.sh, passed as no_log extra-vars):
#   palworld_admin_password  (Vault kv/services/palworld-panel) — REST Basic auth (== 234's AdminPassword)
#   panel_ssh_private_key    (Vault kv/services/palworld-panel) — the start-hook key (root@localhost)
# Run via:  ./scripts/deploy-palworld-panel.sh

- name: Deploy the Palworld control panel on 234 (native Bun service)
  hosts: palworld
  become: true

  vars:
    panel_app_dir: /opt/palworld-panel
    panel_user: palpanel
    panel_group: palpanel
    panel_port: 8080
    bun_install_dir: /opt/bun
    bun_bin: /opt/bun/bin/bun
    # Controller path to the petedio-palworld-panel checkout (backend/ + frontend/).
    palworld_panel_src: "{{ lookup('env', 'HOME') }}/petedio/palworld-panel"
    palworld_target_host: 127.0.0.1
    palworld_rest_port: 8212
    panel_default_countdown: 5
    # Session-history DB (PET-266) — the dashboard's durable store. Under the app dir so
    # it survives redeploys (the source copy only replaces backend/ and frontend/).
    panel_db_path: "{{ panel_app_dir }}/panel-sessions.db"
    # PET-266 lockdown: bind loopback, not 0.0.0.0. The only legitimate callers are a browser
    # on this machine and the co-located cloudflared connector, both over 127.0.0.1. This
    # replaces the old ufw allow-list — a closed socket beats a firewall rule, and ufw is
    # inactive on palworld-mc anyway, so those rules were never actually enforcing anything.
    panel_bind: 127.0.0.1
    # Identity of this install, for attributing console-originated actions. Inventory
    # hostname rather than the live hostname so a laptop rename doesn't rewrite history.
    panel_id: "{{ inventory_hostname }}"
    # Same two people as the Cloudflare Access allow-list for palworld.pdlab.dev — the link
    # is only reachable by someone Access already authenticated as that address.
    panel_identity_map: "soniasdelgadillo@gmail.com=SoniaDillo,pedelgadillo@gmail.com=PeteDillo"

  pre_tasks:
    - name: Assert required secret extra-vars were provided (use scripts/deploy-palworld-panel.sh)
      ansible.builtin.assert:
        that:
          - palworld_admin_password is defined and palworld_admin_password | length > 0
          - panel_ssh_private_key is defined and panel_ssh_private_key | length > 0
        fail_msg: >-
          Missing secret extra-vars. Run scripts/deploy-palworld-panel.sh, which resolves them
          from Vault (kv/services/palworld-panel) and passes them in.
      no_log: true

    - name: Assert the app source is present on the controller
      ansible.builtin.stat:
        path: "{{ palworld_panel_src }}/backend/src/index.ts"
      delegate_to: localhost
      become: false
      register: panel_src_stat
      failed_when: not panel_src_stat.stat.exists

    # Frontend is a Vite/Preact build now (PET-266 migration off the old static-file SPA) —
    # this play copies frontend/dist/, it does not build it. The build has to happen on
    # whatever controller runs this playbook, BEFORE this play does, and write into the
    # checkout at palworld_panel_src: in CI that checkout is bind-mounted read-only into the
    # ansible container (see petedio-palworld-panel's deploy.yml), so a delegate_to:localhost
    # build task HERE cannot write to it. `scripts/deploy-palworld-panel.sh` runs
    # `bun run build` itself before invoking this play; CI's deploy.yml does the same on the
    # runner before the ansible/Docker step. Fail loudly and specifically rather than copying
    # a stale or half-built dist/ (or erroring inside the copy task with a confusing message).
    - name: Check whether the frontend was built (frontend/dist/ present)
      ansible.builtin.stat:
        path: "{{ palworld_panel_src }}/frontend/dist/phone.html"
      delegate_to: localhost
      become: false
      register: panel_dist_stat

    - name: Assert the frontend build is present
      ansible.builtin.assert:
        that: panel_dist_stat.stat.exists
        fail_msg: >-
          {{ palworld_panel_src }}/frontend/dist/phone.html not found — the frontend hasn't
          been built. Run `cd frontend && bun install && bun run build` in the panel checkout
          first (scripts/deploy-palworld-panel.sh and the CI deploy.yml both do this
          automatically; a manual ansible-playbook run does not).
        quiet: true

  tasks:
    - name: Create the panel service group
      ansible.builtin.group:
        name: "{{ panel_group }}"
        system: true

    - name: Create the panel service user (no login shell)
      ansible.builtin.user:
        name: "{{ panel_user }}"
        group: "{{ panel_group }}"
        home: "{{ panel_app_dir }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false

    - name: Create the panel app directory
      ansible.builtin.file:
        path: "{{ panel_app_dir }}"
        state: directory
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0755"

    # ---- Bun runtime (pinned dir; the app has no runtime deps, bun runs the TS directly) ----
    - name: Install runtime prerequisites (unzip + curl are required by the bun installer)
      ansible.builtin.apt:
        name:
          - unzip
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Check whether bun is already installed
      ansible.builtin.stat:
        path: "{{ bun_bin }}"
      register: bun_stat

    - name: Install bun (official installer, to a fixed system path)
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -fsSL https://bun.sh/install | BUN_INSTALL={{ bun_install_dir }} bash"
        creates: "{{ bun_bin }}"
        # `set -o pipefail` is a bashism. Ansible's shell module runs /bin/sh, which on
        # Ubuntu/Pop!_OS is dash -> "Illegal option -o pipefail" (hit on palworld-mc,
        # PET-266). It only ever worked because the LXC's /bin/sh happened to be bash.
        executable: /bin/bash
      when: not bun_stat.stat.exists

    - name: Make bun world-readable/executable
      ansible.builtin.file:
        path: "{{ bun_bin }}"
        mode: "0755"

    # ---- App source (backend + frontend) from the controller checkout ----
    - name: Copy the backend source
      ansible.builtin.copy:
        src: "{{ palworld_panel_src }}/backend/"
        dest: "{{ panel_app_dir }}/backend/"
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0644"
        directory_mode: "0755"
      notify: Restart palworld-panel

    # shared/ is the backend<->frontend contract directory, and the backend imports it at
    # ../../shared/*. It used to be TYPE-ONLY (`import type`), which Bun erases at runtime, so
    # not copying it was invisible. The moment a real runtime import landed (shared/identity.ts,
    # PET-266's surfaceFor) the service crash-looped on the host with
    # "Cannot find module '../../shared/identity'" — while CI stayed green, because tests and
    # the Vite build run from the repo where shared/ exists. Copy it, and assert it below.
    - name: Copy the shared contract directory (backend imports it at runtime)
      ansible.builtin.copy:
        src: "{{ palworld_panel_src }}/shared/"
        dest: "{{ panel_app_dir }}/shared/"
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0644"
        directory_mode: "0755"
      notify: Restart palworld-panel

    # Vite content-hashes every asset filename, so a redeploy never OVERWRITES an old chunk —
    # it adds a new one beside it. copy: is additive-only (it never prunes), so without this
    # the target would accumulate every hashed filename from every deploy forever. Wipe the
    # directory first; the copy right after always repopulates it completely from dist/.
    - name: Clear the previous frontend build before copying the new one
      ansible.builtin.file:
        path: "{{ panel_app_dir }}/frontend/dist"
        state: absent

    - name: Copy the frontend (Vite build output — see the dist/ assert above)
      ansible.builtin.copy:
        src: "{{ palworld_panel_src }}/frontend/dist/"
        dest: "{{ panel_app_dir }}/frontend/dist/"
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0644"
        directory_mode: "0755"
      notify: Restart palworld-panel

    # ---- Secrets: the REST admin password (env-file) + the start-hook private key ----
    - name: Render the backend secret env-file (AdminPassword)
      ansible.builtin.template:
        src: templates/palworld-panel.env.j2
        dest: "{{ panel_app_dir }}/backend.env"
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0600"
      no_log: true
      notify: Restart palworld-panel

    - name: Install the start-hook private key
      ansible.builtin.copy:
        content: "{{ panel_ssh_private_key }}\n"
        dest: "{{ panel_app_dir }}/panel_ssh_key"
        owner: "{{ panel_user }}"
        group: "{{ panel_group }}"
        mode: "0600"
      no_log: true
      notify: Restart palworld-panel

    # ---- systemd unit ----
    - name: Install the palworld-panel systemd unit
      ansible.builtin.template:
        src: templates/palworld-panel.service.j2
        dest: /etc/systemd/system/palworld-panel.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart palworld-panel

    - name: Flush handlers so the unit + files are in place before enable/start
      ansible.builtin.meta: flush_handlers

    - name: Enable + start the palworld-panel service
      ansible.builtin.systemd:
        name: palworld-panel
        enabled: true
        state: started
        daemon_reload: true

    # A green deploy that leaves a crash-looping service is the failure mode this play just
    # had: systemd "started" the unit, the unit died on a missing module, and Ansible reported
    # success. Poll the app's own health endpoint so the deploy fails where the cause is.
    - name: Wait for the panel to answer on loopback (proves it actually booted)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ panel_port }}/api/health"
        status_code: [200]
      register: panel_up
      retries: 10
      delay: 3
      until: panel_up.status == 200

    # ---- Firewall: withdraw the old LAN allow-rules ----
    # The panel now binds 127.0.0.1 (panel_bind), so nothing off-box can reach :8080 at all
    # and these rules grant access to a socket that isn't listening. Deleted rather than left
    # behind: a stale "allow 8080 from the play segment" rule would quietly become real again
    # the moment someone set PANEL_BIND=0.0.0.0 to debug something.
    #
    # `delete: true` is a no-op when the rule isn't there, so this is safe on a fresh host and
    # on one that never had ufw enabled (which is the case on palworld-mc today).
    - name: Withdraw the pre-lockdown panel web-port allow rules (UFW)
      community.general.ufw:
        rule: allow
        port: "{{ panel_port }}"
        proto: tcp
        from_ip: "{{ item }}"
        delete: true
      loop:
        - 192.168.50.0/24
        - 192.168.86.0/24

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart palworld-panel
      ansible.builtin.systemd:
        name: palworld-panel
        state: restarted
      # Only once the unit exists (first run installs it before this can fire meaningfully).
      failed_when: false
