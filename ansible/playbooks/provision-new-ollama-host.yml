# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
---
# Provision a fresh Ubuntu Server box as ollama-host: SSH keys, hostname,
# and a static IP at 192.168.50.12/24 (applied on reboot).
#
# Connection (no secrets needed):
#   ansible_user: ansible, key ~/.ssh/id_ed25519_pedro, become: true
#
# Usage (point --limit / -i at the fresh box's current address):
#   ansible-playbook playbooks/provision-new-ollama-host.yml \
#     -i '<current-ip>,' -e ansible_user=ansible

- name: Provision new Ubuntu Server host as ollama-host
  hosts: all
  gather_facts: false
  become: true
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_pedro
    new_hostname: "ollama-host"
    net_interface: "eth0"
    new_ip: "192.168.50.12/24"
    gateway: "192.168.50.1"
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    user_name: "pedro"

  tasks:
    - name: Add multiple SSH keys to authorized_keys
      ansible.posix.authorized_key:
        user: "{{ user_name }}"
        state: present
        key: "{{ lookup('file', item) }}"
      loop:
        - ~/.ssh/id_ed25519.pub
        - ~/.ssh/id_ed25519_pedro.pub
        - ~/.ssh/id_ed25519_ansible.pub

    - name: Disable password authentication in SSH
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: Restart ssh

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ new_hostname }}"

    - name: Update /etc/hosts with new hostname
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ new_hostname }}"
        state: present

    - name: Configure static IP via netplan
      ansible.builtin.copy:
        dest: /etc/netplan/99-ollama-static.yaml
        mode: "0600"
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              {{ net_interface }}:
                dhcp4: false
                addresses:
                  - {{ new_ip }}
                routes:
                  - to: default
                    via: {{ gateway }}
                nameservers:
                  addresses:
          {% for dns_server in dns %}
                    - {{ dns_server }}
          {% endfor %}

    - name: Validate netplan configuration
      ansible.builtin.command: netplan generate
      changed_when: false

    - name: Schedule reboot to apply IP and hostname
      ansible.builtin.shell: sleep 2 && reboot
      async: 1
      poll: 0
      changed_when: true
      # Fire-and-forget reboot: the connection drops as the box restarts, which
      # is expected here rather than a failure.
      failed_when: false

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
