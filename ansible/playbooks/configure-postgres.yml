---
# configure-postgres.yml — provision the Postgres "RDS" on the LXC 231 host.
#
# Runs in the gap between phase 1 and phase 2 of the postgres.tf two-phase apply:
# Terraform creates the bare LXC 231, this playbook makes it a reachable Postgres
# server with an admin role, THEN you flip var.postgres_ready = true so Terraform
# (cyrilgdn/postgresql) can create the `poker` database + grants.
#
# This playbook also owns the host-level container features that the bpg/proxmox
# provider can't set via API token (root@pam gotcha — see docs/GOTCHAS.md):
# nesting/keyctl are applied out-of-band on the Proxmox node, not here. (For a
# pure-Postgres LXC, nesting is usually unnecessary; included as the standard
# pattern hook — drop the pre_task if not needed.)
#
# Requires the `community.postgresql` collection on the controller:
#   ansible-galaxy collection install community.postgresql
#
# SECRETS (PET-106): postgres_admin_password is REQUIRED and deliberately has NO
# default — a committed placeholder would silently become the live admin password
# on a bare re-run. Resolve it from Vault (kv/poker/db, field admin_password) and
# pass it as a no_log extra-var via a 0600 JSON @file, the repo's shell-wrapper
# convention (see scripts/deploy-poker-api.sh / deploy-openfaas.sh for the
# pattern). It MUST match the password the cyrilgdn provider connects with
# (local.postgres_admin_password — the same Vault value).
#
# Inventory: target the 231 host (e.g. a `postgres` group → 192.168.50.231),
# connecting as root over the SSH key Terraform installed.

- name: Configure Postgres RDS-equivalent (LXC 231)
  hosts: postgres
  become: true
  vars:
    postgres_listen_addresses: "*"
    postgres_port: 5432
    postgres_allowed_cidr: "192.168.50.0/24"
    postgres_admin_user: "postgres"

  pre_tasks:
    - name: Assert the admin password was provided (Vault kv/poker/db — never a committed default)
      ansible.builtin.assert:
        that:
          - postgres_admin_password is defined
          - postgres_admin_password | length > 0
        fail_msg: >-
          Missing postgres_admin_password. Don't run this playbook bare — resolve it from
          Vault (kv/poker/db, field admin_password) and pass it as a no_log extra-var via
          a 0600 JSON @file (see the header / scripts/deploy-poker-api.sh for the pattern).
      no_log: true

  tasks:
    - name: Install PostgreSQL server + psycopg (for community.postgresql modules)
      ansible.builtin.apt:
        name:
          - postgresql
          - python3-psycopg2
        state: present
        update_cache: true

    - name: Discover the active PostgreSQL config directory
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ls -d /etc/postgresql/*/main | sort -V | tail -n1
        executable: /bin/bash
      register: pg_conf_dir
      changed_when: false

    - name: Set listen_addresses so the host accepts LAN connections
      ansible.builtin.lineinfile:
        path: "{{ pg_conf_dir.stdout }}/postgresql.conf"
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '{{ postgres_listen_addresses }}'"
      notify: Restart postgresql

    # PG16+ default password_encryption=scram-sha-256, so the hba method must be
    # scram-sha-256 too: an md5 hba line cannot verify a scram-hashed password and
    # every TCP login fails. regexp replaces any prior host line for this CIDR so
    # re-runs don't leave a stale md5 entry.
    - name: Allow scram-authenticated connections from the homelab subnet (pg_hba)
      ansible.builtin.lineinfile:
        path: "{{ pg_conf_dir.stdout }}/pg_hba.conf"
        regexp: "^host\\s+all\\s+all\\s+{{ postgres_allowed_cidr | regex_escape }}\\s+"
        line: "host    all    all    {{ postgres_allowed_cidr }}    scram-sha-256"
        insertafter: EOF
      notify: Restart postgresql

    - name: Ensure PostgreSQL is started and enabled
      ansible.builtin.service:
        name: postgresql
        state: started
        enabled: true

    # Create the admin/login role the cyrilgdn/postgresql provider connects as.
    # On Debian the bootstrap `postgres` role is peer-auth/passwordless; give it a
    # password so the provider can authenticate over TCP (scram-sha-256).
    - name: Create / update the Postgres admin role used by the Terraform provider
      community.postgresql.postgresql_user:
        name: "{{ postgres_admin_user }}"
        password: "{{ postgres_admin_password }}" # required extra-var, asserted above (PET-106)
        role_attr_flags: "LOGIN,CREATEDB,CREATEROLE"
        state: present
      become_user: postgres
      no_log: true

    # NOTE: the `poker` database, its owner role, and grants are intentionally
    # NOT created here — Terraform (modules/postgres-db) owns those in phase 2.
    # The handler below restarts Postgres so config changes take effect before
    # the provider connects.

  handlers:
    - name: Restart postgresql
      ansible.builtin.service:
        name: postgresql
        state: restarted
