# Fleet static site (PET-187) — nginx origin for the Mission Control "Co-latro fleet
# activity view". Serves /var/www/fleet at / and the MinIO agent-evals mirror SAME-ORIGIN
# under /agent-evals/. GET /whoami returns static JSON to satisfy the page's in-page check
# ONLY — Cloudflare Access on fleet.pdlab.dev is the real security boundary. Listens on
# 8090 (NOT default_server) so the cloudflared tunnel reaches it over the LAN and it
# coexists with anything else on the host.
server {
    listen       8090;
    server_name  _;

    root      /var/www/fleet;
    index     index.html;
    autoindex off;

    # In-page identity check only; Cloudflare Access enforces the real boundary.
    location = /whoami {
        default_type application/json;
        add_header   Cache-Control "no-store";
        return 200 '{"username":"pedro"}';
    }

    # Same-origin eval logs, served from the local MinIO mirror (/var/www/fleet/agent-evals).
    # .jsonl isn't in nginx's mime.types, so force JSON; never stale-cache the live logs.
    location /agent-evals/ {
        default_type application/json;
        add_header   Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Cache-busted assets (PET-222): index.html references app.js/app.css as `?v=<git-sha>`
    # (stamped at deploy time by configure-fleet.yml). A new deploy = a new URL, so it's a
    # fresh fetch through Cloudflare — no purge, no hard-refresh. Unique per version → safe to
    # cache hard. (Regex locations win over the prefix `location /` below for .js/.css.)
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # App shell — index.html. Never cache it: it carries the current `?v=` pointers, so it must
    # always be revalidated or a deploy would stay invisible behind a stale shell (PET-222).
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
    }
}
