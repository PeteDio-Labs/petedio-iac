# Co-latro Admin portal — name-based nginx vhost for the poker-api LXC (230). (PET-87)
#
# WHY THIS LIVES ON 230, NOT ITS OWN HOST: the faasd gateway on LXC 241 is loopback-bound
# and its LAN :8080 is firewall-locked to source 192.168.50.230 (PET-204/F1). So 230 is the
# ONLY origin authorized to reach the gateway — and it already runs nginx for co-latro. This
# vhost serves the static admin `ui/` build and reverse-proxies /function/* to the gateway.
#
# Static build (index.html + app.js) is synced from the MinIO `co-latro-admin-ui` bucket into
# /var/www/co-latro-admin, mirroring EXACTLY how the co-latro frontend ships (see the header of
# co-latro-nginx.conf + configure-poker-api.yml). The admin UI is fully static — app.js talks to
# the functions same-origin at /function/* (no build step, vanilla ES module).
#
# NAME-BASED vhost: the co-latro site is `default_server` (server_name _). This site is selected
# by Host, so it MUST NOT be default_server — it matches only `admin.pdlab.dev`. The Cloudflare
# tunnel forwards Host: admin.pdlab.dev to the origin (the cloudflare-ingress module sets
# origin_request.http_host_header = <hostname> per route), so this server_name matches at the edge.
#
# BEARER INJECTION (never shipped to the browser): the faasd gateway does not auth /function/*
# invokes; the invites function enforces `Authorization: Bearer <token>` (PET-204/F2). nginx injects
# that bearer server-side from a root-only secret file so the client never sees INVITES_TOKEN. The
# token is the SAME value the co-latro backend reads from Vault kv/poker/db COLATRO_INVITES_TOKEN.
# The secret is loaded via a map from /etc/nginx/conf.d/co-latro-admin-invites-token.conf (0640,
# root:www-data, dropped by the playbook from Vault — NOT in this file, NOT in git).
#
# EDGE AUTH: public access is gated by Cloudflare Access (admin.pdlab.dev route, PET-87 →
# cloudflare-routes.tf). Only the allow-listed operator reaches this origin. No origin-side auth
# beyond the bearer injection is required for the single-admin gate.

server {
    listen       80;
    listen       [::]:80;
    server_name  admin.pdlab.dev;

    # Static admin build. Infra syncs the MinIO `co-latro-admin-ui` bucket contents here.
    root   /var/www/co-latro-admin;
    index  index.html;

    # Admin function calls → the faasd gateway on LXC 241. The UI calls /function/<fn>/...
    # (app.js fetch(`/function${p}`)); faas-cli routes /function/<name> to that function.
    # The trailing-slash-preserving proxy_pass keeps the sub-path intact (/function/invites,
    # /function/feedback/<id>/resolve, ...). The bearer is injected here, server-side only.
    location /function/ {
        proxy_pass         http://192.168.50.241:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Inject the invites bearer server-side (from $co_latro_admin_invites_token, set by the
        # map in conf.d). Overrides any client-supplied Authorization so the browser can never
        # spoof or read it. Empty value => header omitted (safe pre-provisioning: the invites
        # function leaves enforcement off when INVITES_TOKEN is unset — see stack.yml/server.ts).
        proxy_set_header   Authorization $co_latro_admin_invites_auth;
    }

    # No cache-busting hashing on the tiny static admin build — keep it simple and never stale.
    location = /app.js {
        add_header Cache-Control "no-cache";
        try_files  $uri =404;
    }

    # SPA-ish: unknown paths fall back to index.html (client-side tab switching, never /function).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
