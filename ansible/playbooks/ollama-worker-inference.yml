# Ported pattern from the existing ollama plays — originally PET-132 (the retired agent
# fleet's worker tier); retuned for the Resume Builder app (P1) — filename kept as-is to
# avoid unnecessary churn, but the layout below is app inference, not a fleet worker.
---
# ollama-worker-inference.yml — configure ollama-host (.12) as the resume builder's
# inference tier: two pinned single-GPU Ollama services + dual-resident models. Quality
# lane (qwen3.5:9b) on the RTX 3060 Ti at :11434; fast lane + embeddings (qwen3.5:4b +
# qwen3-embedding:0.6b) on the GTX 1660 SUPER at :11435. Each model is pinned ENTIRELY to
# its card (CUDA_VISIBLE_DEVICES) — no cross-GPU split, no Turing fallback-kernel risk.
#
# Runs the service role FIRST (both pinned instances up) THEN the models role (pull +
# load-resident), so the residency warm-up can reach :11435 as well as :11434.
#
# Operator-only. Fill the GPU UUIDs in host_vars/ollama-host.yml first (nvidia-smi -L) —
# the service role asserts the placeholders are gone.
#   ansible-playbook playbooks/ollama-worker-inference.yml
#   ansible-playbook playbooks/ollama-worker-inference.yml --check   # dry run

- name: Configure ollama-host resume-builder inference layout
  hosts: ollama
  become: true
  force_handlers: true   # PET-132: apply the env/pin restart even if a later resident-load hiccups
  tasks:
    - name: Configure pinned ollama services (primary + extra instances)
      ansible.builtin.import_role:
        name: ollama-service

    # Apply the systemd drop-in restart (GPU pin + q8_0 KV + 32K ctx) BEFORE warming
    # models, so each resident load happens under the pinned env — not the pre-restart
    # default. Without this the warm-up loaded the coder unpinned (both GPUs) / wrong KV.
    - name: Restart services with new env before warming models
      ansible.builtin.meta: flush_handlers

    - name: Pull base models + load resident models
      ansible.builtin.import_role:
        name: ollama-models
