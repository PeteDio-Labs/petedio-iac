# Ported pattern from the existing ollama plays — PET-132.
---
# ollama-worker-inference.yml — configure ollama-host (.12) as the two-agent pivot's
# WORKER inference tier (PET-132): two pinned single-GPU Ollama services + dual-resident
# models. Coder (qwen3:8b) on the RTX 3060 Ti at :11434; gemma4:e4b on the GTX 1660 SUPER
# at :11435. Each model is pinned ENTIRELY to its card (CUDA_VISIBLE_DEVICES) — no
# cross-GPU split, no Turing fallback-kernel risk.
#
# Runs the service role FIRST (both pinned instances up) THEN the models role (pull +
# load-resident), so the residency warm-up can reach :11435 as well as :11434.
#
# Operator-only (never run by the loop). Fill the GPU UUIDs in host_vars/ollama-host.yml
# first (nvidia-smi -L) — the service role asserts the placeholders are gone.
#   ansible-playbook playbooks/ollama-worker-inference.yml
#   ansible-playbook playbooks/ollama-worker-inference.yml --check   # dry run

- name: Configure ollama-host worker inference layout
  hosts: ollama
  become: true
  roles:
    - ollama-service
    - ollama-models
