---
# configure-palworld.yml — fully provision the Palworld 1.0 dedicated-server LXC
# (234 / .234). (PET-157)
#
# Brings the host from a bare LXC to a running server: SteamCMD installed, `steam`
# service user + install tree, a templated PalWorldSettings.ini, the game port open
# over the LAN (+ the .86 mesh, PET-168), the server BINARIES installed (SteamCMD app
# 2394010), and the systemd unit enabled + started. Idempotent — `app_update` is a
# no-op when current, so re-running just converges (and pulls 1.0 on/after launch).
#
# Launch day (2026-07-10): nothing manual required beyond a converge — the binaries
# task re-runs `app_update 2394010 validate` and pulls the 1.0 build. To fall back to
# "ready-for-binaries" only, run with `-e palworld_install_binaries=false`.
#
# Optional secrets (admin/server passwords): no defaults in the repo. Pass them as a
# no_log @file extra-var if you want them set, the repo convention:
#   ansible-playbook playbooks/configure-palworld.yml \
#     -e '{"palworld_admin_password":"…","palworld_server_password":"…"}'
#
# Inventory: the `palworld` group -> 192.168.50.234, root over the TF-installed key.

- name: Prep the Palworld dedicated-server LXC (ready for binaries)
  hosts: palworld
  become: true

  roles:
    - palworld
