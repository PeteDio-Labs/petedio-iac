---
# agent-loop tasks (PET-125) — toolchain + loop skeleton for the agent-loop host
# (LXC 242, Ubuntu LTS). Idempotent by design: repo-key/repo/apt/npm/user/template
# tasks all converge; the clone uses update: false so a second run never touches a
# working tree the loop may have in flight. NO secrets here — see README.md for the
# manual auth steps (interactive `claude` login, GitHub token from Vault
# kv/services/agent-loop).

- name: Install base packages (git, curl, build-essential)
  ansible.builtin.apt:
    name:
      - git
      - curl
      - build-essential
      - ca-certificates
      - gnupg
      # acl: lets become_user {{ agent_loop_user }} (the git clone below) set temp-file
      # ACLs even if a future run disables SSH pipelining.
      - acl
      # tmux: a detachable session to run claude / the loop in, surviving SSH drops.
      - tmux
    state: present
    update_cache: true

# --- Node.js LTS (NodeSource) -------------------------------------------------

- name: Add the NodeSource apt signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource-repo.asc
    mode: "0644"

- name: Add the NodeSource apt repository (Node {{ agent_loop_nodejs_major }}.x LTS)
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/nodesource-repo.asc]
      https://deb.nodesource.com/node_{{ agent_loop_nodejs_major }}.x nodistro main
    filename: nodesource
    state: present

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

# --- Claude Code ----------------------------------------------------------------

# community.general.npm with global=true converges (installs only when absent).
# Upgrades are deliberate, not on every play: `npm update -g @anthropic-ai/claude-code`.
- name: Install Claude Code (npm global)
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present

# --- gh CLI -----------------------------------------------------------------------

- name: Add the GitHub CLI apt signing key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"

- name: Add the GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
      https://cli.github.com/packages stable main
    filename: github-cli
    state: present

- name: Install gh
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true

# --- Bun (Co-latro runtime + test runner) -----------------------------------------

# Both Co-latro repos are Bun (`bun install` / `bun test`; vitest runs under bun). Same
# npm-global install + "upgrades are deliberate" convention as Claude Code above, so the
# loop's Co-latro test gate fails on the code, not on a missing toolchain. Node LTS (for
# vitest/Vite) is already installed above. (Playwright e2e — browsers + apt libs — is a
# deliberate follow-up, not installed here.)
- name: Install Bun (npm global)
  community.general.npm:
    name: bun
    global: true
    state: present
  when: agent_loop_install_bun | bool

# --- Loop user + workspace ---------------------------------------------------------

- name: Create the loop user ({{ agent_loop_user }})
  ansible.builtin.user:
    name: "{{ agent_loop_user }}"
    shell: /bin/bash
    create_home: true

# Operator keys for direct `ssh {{ agent_loop_user }}@<host>` — skip the root + su hop
# when running the interactive auth bootstrap (scripts/agent-loop-login.sh).
- name: Authorize operator SSH keys for {{ agent_loop_user }}
  ansible.posix.authorized_key:
    user: "{{ agent_loop_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ agent_loop_authorized_keys }}"
  when: agent_loop_authorized_keys | length > 0

- name: Create the work, workspace, and log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_loop_user }}"
    group: "{{ agent_loop_user }}"
    mode: "0755"
  loop:
    - "{{ agent_loop_home }}/work"
    - "{{ agent_loop_workspace }}"
    - "{{ agent_loop_log_dir }}"

# The host mirrors the petedio-workspace layout (PET-130). The OPTIONAL private parent
# (meta-docs) is cloned FIRST, into the workspace root, so the public children below land
# in its already-gitignored subpaths without dirtying its status. It needs gh auth on the
# host, so it's gated behind agent_loop_clone_private (default false — see README).
- name: Clone the private parent workspace + admin (opt-in; needs host gh auth)
  ansible.builtin.git:
    repo: "{{ agent_loop_github_base }}/{{ item.name }}.git"
    dest: "{{ agent_loop_workspace }}/{{ item.dest }}"
    version: main
    update: false
  loop: "{{ agent_loop_private_repos }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.dest }}"
  when: agent_loop_clone_private | bool
  become: true
  become_user: "{{ agent_loop_user }}"

# update: false — Ansible clones each repo once and never mutates the working tree
# afterwards (the loop owns syncing main each iteration; a play must not clobber in-flight
# work). git creates the intermediate dirs (e.g. co-latro/) on clone.
- name: Clone the public child repos into the workspace
  ansible.builtin.git:
    repo: "{{ agent_loop_github_base }}/{{ item.name }}.git"
    dest: "{{ agent_loop_workspace }}/{{ item.dest }}"
    version: main
    update: false
  loop: "{{ agent_loop_repos }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.dest }}"
  become: true
  become_user: "{{ agent_loop_user }}"

# Shell QoL for the loop user: `cc` shorthand for Claude Code. Lives in a marked
# block so it's idempotent and easy to extend later.
- name: Install the cc alias for {{ agent_loop_user }}
  ansible.builtin.blockinfile:
    path: "{{ agent_loop_home }}/.bashrc"
    create: true
    owner: "{{ agent_loop_user }}"
    group: "{{ agent_loop_user }}"
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED — agent-loop"
    block: |
      alias cc='{{ agent_loop_cc_command }}'
  become: true
  become_user: "{{ agent_loop_user }}"
