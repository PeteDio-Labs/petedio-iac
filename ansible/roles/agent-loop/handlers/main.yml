---
# agent-loop handlers (PET-141). Restart the Vault Agent when its config or unit changes.
- name: Restart vault-agent
  ansible.builtin.systemd_service:
    name: vault-agent
    state: restarted
    daemon_reload: true

# Re-exec systemd to pick up changed unit files (PET-148 rebase timer/service templates).
- name: Reload systemd (agent-loop)
  ansible.builtin.systemd_service:
    daemon_reload: true
