---
# agent-loop role defaults (PET-125). The loop runs as a dedicated non-root user:
# Claude Code refuses --dangerously-skip-permissions as root, and the scoped GitHub
# token should not live in root's environment anyway.
agent_loop_user: agent
agent_loop_home: "/home/{{ agent_loop_user }}"

# Where the loop works (PET-130). The host MIRRORS the petedio-workspace layout: a
# workspace root with the child repos cloned into the SAME gitignored nested paths the
# parent repo uses, so a Platform/IaC issue is worked in {{ agent_loop_workspace }}/iac,
# a Co-latro issue in co-latro/backend|frontend, etc.
agent_loop_workspace: "{{ agent_loop_home }}/work/petedio"
agent_loop_github_base: https://github.com/PeteDio-Labs

# Public child repos — always cloned, no token needed (the loop branches/PRs per repo
# via gh). `dest` is RELATIVE to agent_loop_workspace and matches the parent repo's
# .gitignore (iac/, media-iac/, co-latro/backend/, co-latro/frontend/).
agent_loop_repos:
  - { name: petedio-iac, dest: iac }
  - { name: petedio-media-iac, dest: media-iac }
  - { name: co-latro-backend, dest: co-latro/backend }
  - { name: co-latro-frontend, dest: co-latro/frontend }

# Private repos: the parent workspace meta-docs (.agent/lessons.md, .claude/CLAUDE.md)
# and co-latro-admin. These need gh auth ON THE HOST, which is a manual post-provision
# step — so they're OFF by default. Enable once the agent user has GH_TOKEN/gh login
# (see README). The parent clones into the workspace root ("."); its .gitignore already
# ignores the nested children above, so they never dirty its git status.
agent_loop_clone_private: false
agent_loop_private_repos:
  - { name: petedio-workspace, dest: "." }
  - { name: co-latro-admin, dest: co-latro-admin }

agent_loop_log_dir: "{{ agent_loop_home }}/loop-logs"

# Bun — Co-latro's runtime + test runner (both repos: `bun install` / `bun test`, and
# vitest runs under bun). Installed as an npm global like Claude Code; upgrades are
# deliberate (`npm update -g bun`), not on every play. Set false for an IaC-only host.
agent_loop_install_bun: true

# Local throwaway Postgres for the Co-latro test gate (PET-178). co-latro-backend's
# `bun test` has tests (db/sessions, db/analytics, api/http) that call freshDb() — migrate
# + truncate a Postgres — and fail "env-red" without one, muddying BOTH the worker's
# authoring self-check and the reviewer's independent ground truth. testdb.ts defaults to
# postgres://postgres:postgres@localhost:5432/colatro (TEST_DATABASE_URL/DATABASE_URL
# override), so a local pg matching that URL makes the suite green at baseline with NO env
# wiring — verified on the Mac: full suite 297 pass / 0 fail with this pg, 8 env-fails
# without it. Native pg (242 is an LXC with no Docker; Docker-in-LXC would need
# nesting/keyctl we don't grant). Set false for an IaC-only host. Localhost-only, throwaway.
agent_loop_install_test_postgres: true
agent_loop_test_pg_db: colatro
agent_loop_test_pg_password: postgres

# Node.js LTS major (NodeSource). 22 = active LTS ("jod").
agent_loop_nodejs_major: 22

# Per-user npm global prefix for the loop user. Claude Code + Bun install here AS the
# agent — NOT into the root-owned system prefix (/usr) — so the agent can write the
# prefix and Claude Code's auto-update (`npm i -g`) succeeds instead of EACCES-ing with
# "Auto-update failed: no write permission to npm prefix". Its bin/ goes first on the
# agent's PATH (see the .bashrc block) so the user copy wins over /usr/bin. PET-139.
agent_loop_npm_prefix: "{{ agent_loop_home }}/.npm-global"

# The Claude Code model the REVIEWER's verdict runs on. Pinned to an Opus build so the
# gate is never decided by the ambient picker default (it persisted to opus-4-7) and NEVER
# by a Mythos-class model — Fable 5 / Mythos 5 are off-limits for the reviewer even though
# this Claude Code build can select them. Bump deliberately (a future opus-4-9, say); the
# `cc` command AND the managed ~/.claude/settings.json both read this one var.
agent_loop_claude_model: claude-opus-4-8

# Timezone for the loop user — feeds ~/.claude/settings.json `env.TZ` so verdict-log and
# loop-log timestamps stay local (was unmanaged drift from the interactive login).
agent_loop_timezone: America/Chicago

# What the `cc` shell alias runs: `claude` pinned to {{ agent_loop_claude_model }} so every
# reviewer launch is on that model regardless of any persisted picker state. Append
# " --dangerously-skip-permissions" once the host is trusted as a sandbox.
agent_loop_cc_command: "claude --model {{ agent_loop_claude_model }}"

# --- IaC verify tooling (PET-131) --------------------------------------------------
# The loop must be able to run fmt/validate/--syntax-check/lint on-host (it can't apply,
# but it authors). All installed by the role, which runs privileged on apply — the agent
# user itself never gets sudo.

# Terraform: a single pinned binary + its official SHA256, dropped into /usr/local/bin
# (NO HashiCorp apt repo). Pin ≥ 1.10 (the repo's strictest required_version, in
# modules/cloudflare-ingress). Bump version + sha together; the sha is the linux_<arch>
# entry from https://releases.hashicorp.com/terraform/<ver>/terraform_<ver>_SHA256SUMS.
agent_loop_terraform_version: "1.13.5"
agent_loop_terraform_arch: amd64
agent_loop_terraform_sha256: "0dbe3fcc268eb670801af6a6456799d1ae26e72e73797f6c6167e18aafd1fd9a"

# Python tools installed per-user with pipx as the agent (no sudo): ansible-core + the two
# linters. Collections come separately from files/requirements.yml via ansible-galaxy.
agent_loop_pipx_packages:
  - ansible-core
  - yamllint
  - ansible-lint

# PATH used for tasks that invoke pipx-installed tools (ansible-galaxy etc.) non-interactively
# as the agent user. ~/.local/bin (pipx shims) first, then the system path; terraform still
# resolves from /usr/local/bin because the stray ~/.local/bin/terraform is removed (PET-124).
agent_loop_pipx_path: "{{ agent_loop_home }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

# Operator SSH public keys authorized to log in directly as the loop user, so you can
# `ssh agent@192.168.50.242` and run the auth bootstrap without hopping through root.
# Public keys only (safe to commit). Append to add more operators.
agent_loop_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEgSIpFv6ipc5B3CATvK1CIqul0hG6MSUT0cR5TqhAX4 pedro@type-shit"

# --- MinIO client `mc` (PET-135, reviewer loop) --------------------------------------
# The reviewer appends its JSONL eval rows to MinIO (agent-evals/verdicts.jsonl) via `mc`
# (jq isn't on the host; mc is the repo's MinIO convention — see GOTCHAS `mc version
# enable`). Pinned binary + official SHA256 into /usr/local/bin, same pattern as terraform/
# vault. mc uses ROLLING date-release tags; bump version + sha together (the linux-amd64
# line from the release's mc.RELEASE.<ts>.sha256sum on GitHub). The `mc alias` creds are an
# operator step from Vault — NOT here (see docs/runbooks/reviewer-loop.md). Set false for a
# host that never runs the reviewer.
agent_loop_install_mc: true
agent_loop_mc_release: "RELEASE.2025-08-13T08-35-41Z"
agent_loop_mc_arch: amd64
agent_loop_mc_sha256: "01f866e9c5f9b87c2b09116fa5d7c06695b106242d829a8bb32990c00312e891"

# --- Vault Agent (PET-141) -----------------------------------------------------------
# The loop reads its own secrets (proxmox_ro_token now, github_token later) straight from
# Vault instead of hand-exported env vars. A Vault Agent auto-auths with the read-only
# `agent-loop` AppRole (environments/homelab/vault-config) and keeps a renewed token in
# ~agent/.vault-token, so scripts/proxmox-ro-config.sh's Vault fallback (and any
# `vault kv get`) self-serves with NO operator step and NO claude restart. Set false for an
# IaC-only / offline host.
agent_loop_vault_agent_enabled: true
agent_loop_vault_addr: https://192.168.50.223:8200

# Pinned vault binary (the CLI and `vault agent` are one binary) + its official SHA256,
# dropped into /usr/local/bin like terraform. Matches the server (v2.0.1). Bump version +
# sha together (the linux_<arch> line from
# https://releases.hashicorp.com/vault/<ver>/vault_<ver>_SHA256SUMS).
agent_loop_vault_version: "2.0.1"
agent_loop_vault_arch: amd64
agent_loop_vault_sha256: "c6ed3be36a750875906916716680322719920a102f98c9a0b3105ecff63b9e34"

# Committed homelab Vault CA (self-signed; NOT a secret) — copied to the host so the Agent
# verifies TLS. Path is relative to the playbook dir (ansible/playbooks).
agent_loop_vault_ca_src: "{{ playbook_dir }}/../../environments/homelab/vault-ca.crt"

# agent-loop AppRole creds — operator-provisioned into the gitignored .secrets/ (same
# pattern as the ansible/terraform-local AppRoles), copied to the host 0600. NOT in the
# repo. See README for the one-time provisioning (apply vault-config, then mint role_id +
# secret_id).
agent_loop_vault_role_id_file: "{{ playbook_dir }}/../../.secrets/agent-loop.role_id"
agent_loop_vault_secret_id_file: "{{ playbook_dir }}/../../.secrets/agent-loop.secret_id"

# --- Auto-rebase loop PRs (PET-148) --------------------------------------------------
# A systemd timer runs scripts/rebase-loop-prs.sh as the loop user, rebasing the loop's
# OWN open PRs onto main + force-pushing (loop branches only — see the script's two guards)
# so a fresh plan-on-PR is always what Pedro reviews. The script self-serves GH_TOKEN from
# Vault (kv/services/agent-loop, field github_token) via the Vault Agent token on disk, so
# it needs no env secret. Set false for an IaC-only/offline host or to disable the timer.
agent_loop_rebase_timer_enabled: true
# OnCalendar for the timer. Every 15 min — the AC is "up to date within the cron interval";
# RandomizedDelaySec spreads load and avoids racing a just-finished merge's plan run.
agent_loop_rebase_oncalendar: "*:0/15"
# The script lives in the loop's own iac clone (cloned by this role). It clones a fresh
# throwaway copy into /tmp at runtime, so running it from the live clone is safe.
agent_loop_rebase_script: "{{ agent_loop_workspace }}/iac/scripts/rebase-loop-prs.sh"

# --- Auto-stamp pedro_verdict on closed worker PRs (PET-199) -------------------------
# A systemd timer runs scripts/reviewer/reviewer-stamp-poll.sh as the loop user. It reads
# each recently-closed worker PR's final state and stamps the matching verdict row's
# pedro_verdict (merged → merge, closed-unmerged → kickback) via the PET-191 stamp script —
# so the fleet view's `pedro` column fills without Pedro running the stamp by hand. It only
# touches rows the reviewer already logged with an empty pedro_verdict (never a human PR,
# never an already-stamped row). Reads GH_TOKEN from Vault like the rebase timer, and writes
# MinIO via the operator-seeded `mc` alias. Set false for an IaC-only host or one that never
# runs the reviewer (mc/reviewer scripts absent). Manual stamping still works for overrides.
agent_loop_stamp_poll_timer_enabled: true
# OnCalendar for the timer. Every 15 min — the `pedro` column should reflect a merge/close
# within a cron interval; RandomizedDelaySec spreads load off the reviewer's append window.
agent_loop_stamp_poll_oncalendar: "*:0/15"
# The script lives in the loop's own iac clone (cloned by this role); it only reads GitHub
# and delegates the MinIO write to the sibling stamp script — safe to run from the live clone.
agent_loop_stamp_poll_script: "{{ agent_loop_workspace }}/iac/scripts/reviewer/reviewer-stamp-poll.sh"
