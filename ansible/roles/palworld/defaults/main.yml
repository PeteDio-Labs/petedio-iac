---
# palworld role defaults (PET-157). Fully provisions the LXC incl. the SteamCMD server
# binaries (app 2394010) and an enabled+started systemd unit, so launch day is just a
# power-on + the auto-pulled 1.0 update. Flip palworld_install_binaries=false for the
# old "ready-for-binaries" behavior (binaries left as an operator launch-day step).

# Service account the dedicated server + SteamCMD run as (never root).
palworld_user: steam
palworld_group: steam
palworld_home: /home/steam

# Install layout under the steam user.
palworld_steamcmd_dir: "{{ palworld_home }}/steamcmd"
palworld_server_dir: "{{ palworld_home }}/palworld" # app 2394010 installs here
palworld_steam_app_id: 2394010

# The systemd unit is installed and — when palworld_enable_service — enabled + started
# once the binaries are present, so the server auto-starts on container/host boot.
palworld_service_name: palworld
# AppExec path the unit launches; lives under the server dir once binaries land.
palworld_server_exec: "{{ palworld_server_dir }}/PalServer.sh"

# Install/update the SteamCMD server binaries (app 2394010) during the play, and
# enable+start the unit — so the box is fully launch-ready (power on + go) and the
# launch-day converge auto-pulls the 1.0 build. Set false for "ready-for-binaries" only.
palworld_install_binaries: true
palworld_enable_service: true

# --- PalWorldSettings.ini tunables (exposed so the .ini stays declarative) --------
palworld_server_name: "PeteDio Palworld"
palworld_server_description: "Managed by petedio-iac (PET-157)"
palworld_max_players: 32
palworld_public_port: 8211
# Admin/server passwords: leave empty here (no secrets in the repo). The operator
# supplies them as no_log extra-vars at run time if wanted — see the play header.
palworld_admin_password: ""
palworld_server_password: ""
palworld_rcon_enabled: false
palworld_rcon_port: 25575

# REST API — the control panel (PET-266) depends on it; live 234 has had it on since
# launch day but only by hand-edit (drift, found in PET-278). Declared here so a
# converge keeps it. EnableGameDataAPI gates the 1.0 /v1/api/game-data world-snapshot
# endpoint (undocumented flag, recovered from binary strings — PET-278 spike). The
# template task carries no restart notify, so flag changes arm at the NEXT server
# restart (e.g. the next bedtime shutdown/start cycle), never mid-session.
palworld_rest_api_enabled: true
palworld_rest_api_port: 8212
palworld_gamedata_api_enabled: true

# --- Base-building world tunables (bases + pals) ----------------------------------
# Role defaults mirror the engine defaults (4 base camps per guild / 15 worker pals
# per camp); inventory/group_vars/palworld.yml raises them for the shared world (that
# file is also the panel's GitOps write target — keep overrides there, not here). Like
# the REST flags above, the converge re-templates the ini with no restart notify, so
# new values arm at the NEXT server restart — never mid-session.
palworld_base_camp_max_in_guild: 4 # BaseCampMaxNumInGuild (ini/slider max 10)
palworld_base_camp_worker_max: 15 # BaseCampWorkerMaxNum (slider max 20; ini accepts 1-50, >20 is a perf lever)

# --- Firewall -------------------------------------------------------------------
# Access is intended over Tailscale, so the PUBLIC LAN/WAN rule is off by default.
# Turn on only if you really want the game port reachable on the LAN.
palworld_firewall_enabled: true
palworld_open_public_port: false
palworld_firewall_subnet: 192.168.50.0/24
# Platform-LAN (.50) ingress. True for the LXC, which is dual-homed onto both segments;
# a host with no .50 NIC at all (the baremetal box) turns it off so we don't carry a rule
# for a subnet it can't be reached on. (PET-266 migration)
palworld_lan_ingress_enabled: true

# Mesh (192.168.86.x) ingress — PET-168. Off by default (the dual-home NIC is opt-in);
# the palworld inventory group flips palworld_mesh_enabled on. Opens 8211/udp from the
# mesh subnet so clients on that segment can reach the server over the eth1 NIC.
palworld_mesh_enabled: false
palworld_mesh_subnet: 192.168.86.0/24

# --- Which world to serve ---------------------------------------------------------
# `DedicatedServerName` in GameUserSettings.ini names the SaveGames/0/<name> folder the
# server loads. It is NOT in PalWorldSettings.ini and nothing else points at the world:
# restoring SaveGames/ alone leaves this pointing at whatever world the host last made,
# and the server silently boots a BRAND-NEW empty world instead of the restored one.
# Caught rehearsing the PET-266 migration — the server came up green, the panel showed
# "online", and the map was empty.
#
# Empty -> leave the file alone (the LXC's value is already correct and self-maintained).
# Set it to the world GUID on any host that must be pinned to a specific save.
palworld_dedicated_server_name: ""

# --- Baremetal / physical host ----------------------------------------------------
# The role was written against a Proxmox LXC. These gate the extra handling a PHYSICAL
# host needs (PET-266 migration: LXC 234 -> the ex-mission-control laptop on the .86
# play segment). All default to the LXC behavior, so 234 converges byte-identically.
palworld_baremetal: false

# A laptop suspends on lid-close and on idle — either one kills the game server. When
# true the role masks the sleep targets and writes a logind drop-in. Defaults to
# whatever palworld_baremetal says: physical host -> inhibit, container -> don't
# (a container has no logind sleep targets to mask anyway).
palworld_inhibit_sleep: "{{ palworld_baremetal }}"

# Public half of the control panel's start-hook SSH key. The panel authenticates to
# root with the private half (Vault kv/services/palworld-panel -> panel_ssh_private_key)
# and lands on the palctl-remote forced command, which allow-lists start/status/
# check-update/update. This line was HAND-PLACED on 234 and never codified (PET-266
# migration found it) — without it, a rebuilt host has a dead Start button. A public key
# is not a secret, so it lives here rather than in Vault. Empty -> task skipped.
palworld_panel_starthook_pubkey: >-
  ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE/w77J42GrWIqYm+55G5FRHoPR3NlbbZG59fDRjrg6Z
  palworld-panel-starthook
