---
# palworld role (PET-157) — provision a Palworld 1.0 dedicated-server LXC end-to-end:
# SteamCMD + steam user + install tree + templated PalWorldSettings.ini + systemd unit,
# AND (when palworld_install_binaries) install/update the server binaries and enable +
# start the unit. Native SteamCMD server (no Docker). Idempotent: a converged host
# re-runs to no changes; SteamCMD `app_update` is itself idempotent (no-op when current).
#
# Launch day (2026-07-10): the binaries task re-runs `app_update 2394010 validate`, which
# pulls the 1.0 build automatically on the first converge after release — no manual step.
# Set palworld_install_binaries=false to fall back to the old "ready-for-binaries" prep.

# NB the guard: this used to be `creates: /var/lib/dpkg/arch`, which is only a valid
# proxy for "no foreign arch yet" on the MINIMAL Debian LXC template. Every normal
# Debian/Ubuntu install (incl. the Pop!_OS baremetal host, PET-266) already ships that
# file, so the task silently skipped and the 32-bit SteamCMD prereqs never installed.
# Ask dpkg what is actually enabled instead.
- name: Read the enabled foreign dpkg architectures
  ansible.builtin.command:
    cmd: dpkg --print-foreign-architectures
  register: palworld_foreign_arches
  changed_when: false
  # Read-only, and the next task's `when` consumes its output — without this a --check
  # run would skip it and then fail on the undefined stdout_lines.
  check_mode: false

- name: Enable i386 multiarch (SteamCMD is 32-bit)
  ansible.builtin.command:
    cmd: dpkg --add-architecture i386
  when: "'i386' not in palworld_foreign_arches.stdout_lines"
  changed_when: true
  notify: Update apt cache

- name: Flush handlers so the apt cache reflects i386 before installing
  ansible.builtin.meta: flush_handlers

- name: Install SteamCMD prerequisites + server runtime libs
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - sudo # become_user steam needs it; the minimal Debian LXC template ships without it
      - tar
      - lib32gcc-s1 # SteamCMD + the dedicated server need the 32-bit gcc runtime
      - libc6-i386
      - ufw
    state: present
    update_cache: true

- name: Create the steam service group
  ansible.builtin.group:
    name: "{{ palworld_group }}"
    system: true

- name: Create the steam service user (no login shell needed for a service account)
  ansible.builtin.user:
    name: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    home: "{{ palworld_home }}"
    shell: /bin/bash # SteamCMD scripts expect a real shell
    system: true
    create_home: true

- name: Lay down the install directory structure (steam-owned)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0755"
  loop:
    - "{{ palworld_steamcmd_dir }}"
    - "{{ palworld_server_dir }}"

- name: Fetch the SteamCMD bootstrap tarball
  ansible.builtin.get_url:
    url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: "{{ palworld_steamcmd_dir }}/steamcmd_linux.tar.gz"
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0644"

- name: Unpack SteamCMD (idempotent — skips once steamcmd.sh is present)
  ansible.builtin.unarchive:
    src: "{{ palworld_steamcmd_dir }}/steamcmd_linux.tar.gz"
    dest: "{{ palworld_steamcmd_dir }}"
    remote_src: true
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    creates: "{{ palworld_steamcmd_dir }}/steamcmd.sh"

# PalWorldSettings.ini lives in the server's save tree. We create the dir tree the
# server expects so the templated config is in place before first boot; the server
# reads/writes it from here.
- name: Create the PalWorldSettings config directory
  ansible.builtin.file:
    path: "{{ palworld_server_dir }}/Pal/Saved/Config/LinuxServer"
    state: directory
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0755"

# The CI apply cannot read the game passwords (its Vault role grants only lxc-ssh +
# Nexus creds), so `palworld_admin_password`/`palworld_server_password` arrive empty on
# merge-applies. A converge must never blank a password already live on the host: when
# a password var is empty, re-use whatever the existing ini has (brownfield-safe; the
# operator can still rotate by passing the extra-var). (PET-278)
- name: Read the existing PalWorldSettings.ini (password preservation)
  ansible.builtin.slurp:
    src: "{{ palworld_server_dir }}/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini"
  register: palworld_existing_ini
  failed_when: false
  no_log: true

- name: Preserve the live AdminPassword when none was supplied
  ansible.builtin.set_fact:
    palworld_admin_password: "{{ (palworld_existing_ini.content | b64decode | regex_search('AdminPassword=\"([^\"]*)\"', '\\1') or [''])| first }}"
  when:
    - palworld_admin_password | length == 0
    - palworld_existing_ini.content is defined
  no_log: true

- name: Preserve the live ServerPassword when none was supplied
  ansible.builtin.set_fact:
    palworld_server_password: "{{ (palworld_existing_ini.content | b64decode | regex_search('ServerPassword=\"([^\"]*)\"', '\\1') or [''])| first }}"
  when:
    - palworld_server_password | length == 0
    - palworld_existing_ini.content is defined
  no_log: true

- name: Template PalWorldSettings.ini (tunables from role vars)
  ansible.builtin.template:
    src: PalWorldSettings.ini.j2
    dest: "{{ palworld_server_dir }}/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini"
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0644"

- name: Install the Palworld systemd unit
  ansible.builtin.template:
    src: palworld.service.j2
    dest: "/etc/systemd/system/{{ palworld_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

# --- Control scripts (PET-266) ---------------------------------------------------
# palctl-remote is the forced command the control panel's restricted SSH key is pinned to
# (root's authorized_keys → command="/usr/local/bin/palctl-remote"); it allow-lists exactly
# the verbs the panel may run — start / status / check-update / update. palworld-update is the
# reusable SteamCMD check/apply the last two verbs call. Both were previously hand-placed drift
# on 234; codified here so a reprovision restores them and the update verbs stay in sync.
- name: Install the palctl-remote forced-command dispatcher
  ansible.builtin.copy:
    src: palctl-remote
    dest: /usr/local/bin/palctl-remote
    owner: root
    group: root
    mode: "0755"

- name: Install the palworld-update check/apply script
  ansible.builtin.copy:
    src: palworld-update
    dest: /usr/local/bin/palworld-update
    owner: root
    group: root
    mode: "0755"

# The other half of the panel's control path: root's authorized_keys entry that pins the
# panel's key to the palctl-remote forced command. palctl-remote alone is inert without
# it — the panel could not authenticate — so a host rebuilt from this role would come up
# with a dead Start button. Hand-placed on 234 until PET-266's migration codified it.
- name: Pin the panel start-hook key to the palctl-remote forced command
  ansible.posix.authorized_key:
    user: root
    key: "{{ palworld_panel_starthook_pubkey }}"
    key_options: >-
      command="/usr/local/bin/palctl-remote",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding
    state: present
    exclusive: false
  when: palworld_panel_starthook_pubkey | length > 0

# Reload systemd so the new unit is known before the binaries-install + enable tasks
# below pick it up (the enable/start is gated on palworld_install_binaries).
- name: Reload systemd so the new unit is known
  ansible.builtin.meta: flush_handlers

- name: Allow the Palworld game port over the LAN (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    from_ip: "{{ palworld_firewall_subnet }}"
    comment: "Palworld game port - homelab LAN (PET-157)"
  when:
    - palworld_firewall_enabled | bool
    - palworld_lan_ingress_enabled | bool

# Public exposure is OFF by default — access is over Tailscale. Only opens the port
# to any source when explicitly turned on.
- name: Allow the Palworld game port publicly (only when explicitly enabled)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    comment: "Palworld game port - PUBLIC (PET-157)"
  when:
    - palworld_firewall_enabled | bool
    - palworld_open_public_port | bool

# Mesh ingress (PET-168): allow the game port from the 192.168.86.x segment, so clients
# on the mesh reach the server over the eth1 dual-home NIC. Gated on palworld_mesh_enabled
# (the palworld inventory group sets it true).
- name: Allow the Palworld game port from the .86 mesh (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    from_ip: "{{ palworld_mesh_subnet }}"
    comment: "Palworld game port - .86 mesh (PET-168)"
  when:
    - palworld_firewall_enabled | bool
    - palworld_mesh_enabled | bool

# --- Physical-host power behavior (PET-266) ---------------------------------------
# The game host is a laptop: out of the box it suspends on lid-close and on idle, and a
# suspended host is a dead server (players drop, the panel goes red). Masking the sleep
# targets is what actually enforces this — systemd cannot reach a masked target, so
# logind/GNOME/UPower all fail to suspend regardless of their own settings — and it takes
# effect immediately. The logind drop-in is the belt-and-braces record of intent and
# arms at the next boot; we deliberately do NOT restart systemd-logind, since that can
# terminate live user sessions on a desktop host for no benefit here.
- name: Inhibit suspend/hibernate on a physical host
  when: palworld_inhibit_sleep | bool
  block:
    - name: Create the logind drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/logind.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ignore lid-close and idle (logind drop-in)
      ansible.builtin.copy:
        # NB: no `{{ ansible_managed }}` here — that var is injected by the template
        # action plugin only, and is undefined inside `copy: content:`.
        content: |
          # Ansible managed — roles/palworld (petedio-iac). Do not edit by hand.
          # This host runs the Palworld dedicated server (PET-266). A closed lid or an
          # idle timeout must never suspend it. See also the masked sleep targets.
          [Login]
          HandleLidSwitch=ignore
          HandleLidSwitchExternalPower=ignore
          HandleLidSwitchDocked=ignore
          IdleAction=ignore
        dest: /etc/systemd/logind.conf.d/10-palworld-no-sleep.conf
        owner: root
        group: root
        mode: "0644"

    - name: Mask the sleep targets (immediate, and survives a logind reconfigure)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

# --- Binaries + service ----------------------------------------------------------
# Install/update the dedicated-server binaries via SteamCMD. No `creates:` guard — we
# WANT this to re-run so the launch-day converge pulls the 1.0 build; `app_update` is
# idempotent (a no-op when already current). Runs as the unprivileged steam user.
- name: Install / update the Palworld server binaries (SteamCMD, app {{ palworld_steam_app_id }})
  become: true
  become_user: "{{ palworld_user }}"
  ansible.builtin.command:
    cmd: >-
      {{ palworld_steamcmd_dir }}/steamcmd.sh
      +force_install_dir {{ palworld_server_dir }}
      +login anonymous
      +app_update {{ palworld_steam_app_id }} validate
      +quit
  register: palworld_steamcmd
  changed_when: "'already up to date' not in (palworld_steamcmd.stdout | default(''))"
  when: palworld_install_binaries | bool
  # On a host where SteamCMD has never run, the FIRST invocation bootstraps and updates
  # ITSELF, relaunches, and then reports `Failed to install app '2394010' (Missing
  # configuration)` (rc 8) — the app install never happens. The next run works. So a
  # fresh host could never converge in a single pass; proven on palworld-mc (PET-266),
  # where an identical hand-run straight after the failure printed "Success! App
  # '2394010' fully installed". Retry rather than making the operator run the play twice.
  retries: 3
  delay: 10
  until: palworld_steamcmd is not failed

# Enable on boot + start now (binaries are present). Gated on the binaries being
# installed so we never try to start a unit whose ExecStart doesn't exist yet.
- name: Enable + start the Palworld service (auto-starts on container/host boot)
  ansible.builtin.systemd:
    name: "{{ palworld_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when:
    - palworld_install_binaries | bool
    - palworld_enable_service | bool
