---
# palworld role (PET-157) — provision a Palworld 1.0 dedicated-server LXC end-to-end:
# SteamCMD + steam user + install tree + templated PalWorldSettings.ini + systemd unit,
# AND (when palworld_install_binaries) install/update the server binaries and enable +
# start the unit. Native SteamCMD server (no Docker). Idempotent: a converged host
# re-runs to no changes; SteamCMD `app_update` is itself idempotent (no-op when current).
#
# Launch day (2026-07-10): the binaries task re-runs `app_update 2394010 validate`, which
# pulls the 1.0 build automatically on the first converge after release — no manual step.
# Set palworld_install_binaries=false to fall back to the old "ready-for-binaries" prep.

- name: Enable i386 multiarch (SteamCMD is 32-bit)
  ansible.builtin.command:
    cmd: dpkg --add-architecture i386
    creates: /var/lib/dpkg/arch
  notify: Update apt cache

- name: Flush handlers so the apt cache reflects i386 before installing
  ansible.builtin.meta: flush_handlers

- name: Install SteamCMD prerequisites + server runtime libs
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - sudo # become_user steam needs it; the minimal Debian LXC template ships without it
      - tar
      - lib32gcc-s1 # SteamCMD + the dedicated server need the 32-bit gcc runtime
      - libc6-i386
      - ufw
    state: present
    update_cache: true

- name: Create the steam service group
  ansible.builtin.group:
    name: "{{ palworld_group }}"
    system: true

- name: Create the steam service user (no login shell needed for a service account)
  ansible.builtin.user:
    name: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    home: "{{ palworld_home }}"
    shell: /bin/bash # SteamCMD scripts expect a real shell
    system: true
    create_home: true

- name: Lay down the install directory structure (steam-owned)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0755"
  loop:
    - "{{ palworld_steamcmd_dir }}"
    - "{{ palworld_server_dir }}"

- name: Fetch the SteamCMD bootstrap tarball
  ansible.builtin.get_url:
    url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: "{{ palworld_steamcmd_dir }}/steamcmd_linux.tar.gz"
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0644"

- name: Unpack SteamCMD (idempotent — skips once steamcmd.sh is present)
  ansible.builtin.unarchive:
    src: "{{ palworld_steamcmd_dir }}/steamcmd_linux.tar.gz"
    dest: "{{ palworld_steamcmd_dir }}"
    remote_src: true
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    creates: "{{ palworld_steamcmd_dir }}/steamcmd.sh"

# PalWorldSettings.ini lives in the server's save tree. We create the dir tree the
# server expects so the templated config is in place before first boot; the server
# reads/writes it from here.
- name: Create the PalWorldSettings config directory
  ansible.builtin.file:
    path: "{{ palworld_server_dir }}/Pal/Saved/Config/LinuxServer"
    state: directory
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0755"

- name: Template PalWorldSettings.ini (tunables from role vars)
  ansible.builtin.template:
    src: PalWorldSettings.ini.j2
    dest: "{{ palworld_server_dir }}/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini"
    owner: "{{ palworld_user }}"
    group: "{{ palworld_group }}"
    mode: "0644"

- name: Install the Palworld systemd unit
  ansible.builtin.template:
    src: palworld.service.j2
    dest: "/etc/systemd/system/{{ palworld_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

# Reload systemd so the new unit is known before the binaries-install + enable tasks
# below pick it up (the enable/start is gated on palworld_install_binaries).
- name: Reload systemd so the new unit is known
  ansible.builtin.meta: flush_handlers

- name: Allow the Palworld game port over the LAN (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    from_ip: "{{ palworld_firewall_subnet }}"
    comment: "Palworld game port - homelab LAN (PET-157)"
  when: palworld_firewall_enabled | bool

# Public exposure is OFF by default — access is over Tailscale. Only opens the port
# to any source when explicitly turned on.
- name: Allow the Palworld game port publicly (only when explicitly enabled)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    comment: "Palworld game port - PUBLIC (PET-157)"
  when:
    - palworld_firewall_enabled | bool
    - palworld_open_public_port | bool

# Mesh ingress (PET-168): allow the game port from the 192.168.86.x segment, so clients
# on the mesh reach the server over the eth1 dual-home NIC. Gated on palworld_mesh_enabled
# (the palworld inventory group sets it true).
- name: Allow the Palworld game port from the .86 mesh (UFW)
  community.general.ufw:
    rule: allow
    port: "{{ palworld_public_port }}"
    proto: udp
    from_ip: "{{ palworld_mesh_subnet }}"
    comment: "Palworld game port - .86 mesh (PET-168)"
  when:
    - palworld_firewall_enabled | bool
    - palworld_mesh_enabled | bool

# --- Binaries + service ----------------------------------------------------------
# Install/update the dedicated-server binaries via SteamCMD. No `creates:` guard — we
# WANT this to re-run so the launch-day converge pulls the 1.0 build; `app_update` is
# idempotent (a no-op when already current). Runs as the unprivileged steam user.
- name: Install / update the Palworld server binaries (SteamCMD, app {{ palworld_steam_app_id }})
  become: true
  become_user: "{{ palworld_user }}"
  ansible.builtin.command:
    cmd: >-
      {{ palworld_steamcmd_dir }}/steamcmd.sh
      +force_install_dir {{ palworld_server_dir }}
      +login anonymous
      +app_update {{ palworld_steam_app_id }} validate
      +quit
  register: palworld_steamcmd
  changed_when: "'already up to date' not in (palworld_steamcmd.stdout | default(''))"
  when: palworld_install_binaries | bool

# Enable on boot + start now (binaries are present). Gated on the binaries being
# installed so we never try to start a unit whose ExecStart doesn't exist yet.
- name: Enable + start the Palworld service (auto-starts on container/host boot)
  ansible.builtin.systemd:
    name: "{{ palworld_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when:
    - palworld_install_binaries | bool
    - palworld_enable_service | bool
