# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .240.
# Mac-local control node on the LAN: NO ProxyJump by default, and no
# vault_password_file (these ollama plays need no secrets).
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
control_path_dir = /tmp/ansible-cp
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# Recovery only: if .240 is unreachable directly, pve01 (.10) can serve as a
# jump host. NOT the default (Mac is on the LAN). To use it for one run, e.g.:
#   ansible-playbook ... -e "ansible_ssh_common_args='-o ProxyJump=pve01'"
