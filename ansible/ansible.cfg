# Ported from homelab-infra for the greenfield petedio-iac.
# Dual-GPU (GTX 1660 SUPER + RTX 3060 Ti), .12.
# Mac-local control node on the LAN: NO ProxyJump by default, and no
# vault_password_file (these ollama plays need no secrets).
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# PET-112: host-key verification ON (was False). The OpenSSH policy is set in
# [ssh_connection] ssh_args below to StrictHostKeyChecking=accept-new — trust on
# first use, but ERROR if a known host's key later changes (so it needs no
# pre-populated known_hosts, yet still defends against an ARP-spoofed host
# answering at a known IP). 'accept-new' is an OpenSSH value, not an ansible
# boolean, so it lives in ssh_args; this flag must stay True for ssh_args to apply.
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
result_format = yaml
# All managed hosts are Debian LXCs exposing /usr/bin/python3 — use auto-discovery
# but drop the "discovered interpreter ... could change" future-proofing warning.
interpreter_python = auto_silent
# Some inventory group names use hyphens (e.g. poker-api). 'ignore' keeps them as-is
# (so `hosts: poker-api` still matches) and drops the "Invalid characters ... in group
# names" warning. Do NOT use 'silently'/'always' — those transform the name and would
# break the hosts: references.
force_valid_group_names = ignore

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
pipelining = True
control_path_dir = /tmp/ansible-cp
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
# Recovery only: if .12 is unreachable directly, pve01 (.10) can serve as a
# jump host. NOT the default (Mac is on the LAN). To use it for one run, e.g.:
#   ansible-playbook ... -e "ansible_ssh_common_args='-o ProxyJump=pve01'"
